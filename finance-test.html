<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pace Finance</title>

<style>
:root{
  --bg:#0f1115;
  --panel:#171b22;
  --line:rgba(255,255,255,0.08);
  --text:#f5f7fb;
  --muted:#9ea6b5;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#60a5fa;
  --orange:#f59e0b;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:18px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.wrap{
  max-width:1200px;
  margin:auto;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:18px;
  margin-bottom:18px;
}

h1,h2,h3,h4,p{
  margin-top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.kpi{
  background:rgba(255,255,255,0.04);
  border-radius:18px;
  padding:14px;
}

.kpi-title{
  color:var(--muted);
  font-size:12px;
  margin-bottom:6px;
}

.kpi-value{
  font-size:24px;
  font-weight:700;
}

.good{
  color:var(--green);
}

.bad{
  color:var(--red);
}

input,select,button{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  margin-top:10px;
  background:rgba(255,255,255,0.06);
  color:white;
}

button{
  background:#ff3b30;
  font-weight:700;
  cursor:pointer;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid var(--line);
}

.item:last-child{
  border-bottom:none;
}

.item-title{
  font-weight:700;
}

.item-meta{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
}

.small-btn{
  width:auto;
  padding:8px 12px;
  margin:0;
}

.green-btn{
  background:rgba(34,197,94,0.25);
}

.empty{
  color:var(--muted);
  padding:10px 0;
}

.section{
  margin-top:30px;
}

@media(max-width:900px){

  .grid{
    grid-template-columns:1fr;
  }

  .row{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <h1>Pace Finance</h1>
    <p style="color:var(--muted)">
      Track life, business and monthly payments clearly.
    </p>

    <div class="grid" id="kpis"></div>
  </div>

  <div class="card">

    <h2>Add Transaction</h2>

    <div class="row">
      <select id="bucket">
        <option value="life">Life</option>
        <option value="business">Business</option>
      </select>

      <select id="type">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
    </div>

    <div class="row">
      <input id="amount" type="number" placeholder="Amount">
      <input id="date" type="date">
    </div>

    <input id="subtype" placeholder="Category">
    <input id="note" placeholder="Note">

    <button id="saveTransaction">
      Save Transaction
    </button>

  </div>

  <div class="card">

    <h2>Add Fixed Bill</h2>

    <div class="row">
      <input id="billName" placeholder="Bill name">
      <input id="billAmount" type="number" placeholder="Amount">
    </div>

    <button id="saveBill">
      Add Fixed Bill
    </button>

  </div>

  <div class="card">

    <h2>Monthly Paid Checklist</h2>

    <div class="section">
      <h3>Left To Pay</h3>
      <div id="leftToPay"></div>
    </div>

    <div class="section">
      <h3>Paid This Month</h3>
      <div id="paidThisMonth"></div>
    </div>

  </div>

  <div class="card">

    <h2>Transactions</h2>
    <div id="transactions"></div>

  </div>

</div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

let transactions = [];
let fixedBills = [];
let paidStatuses = [];

function money(v){
  return `£${Number(v || 0).toFixed(2)}`;
}

function currentMonth(){
  const d = new Date();

  return `${d.getFullYear()}-${String(
    d.getMonth()+1
  ).padStart(2,"0")}`;
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function isPaid(sourceTable, sourceId){

  return paidStatuses.some(x =>
    x.source_table === sourceTable &&
    x.source_id === sourceId &&
    x.paid_month === currentMonth() &&
    x.paid === true
  );

}

async function togglePaid(sourceTable, sourceId, current){

  const user = await getUser();

  if(current){

    await supabase
      .from("monthly_expense_status")
      .delete()
      .eq("user_id", user.id)
      .eq("source_table", sourceTable)
      .eq("source_id", sourceId)
      .eq("paid_month", currentMonth());

  } else {

    await supabase
      .from("monthly_expense_status")
      .insert([{
        user_id:user.id,
        source_table:sourceTable,
        source_id:sourceId,
        paid:true,
        paid_month:currentMonth(),
        paid_date:new Date().toISOString()
      }]);

  }

  await load();
}

window.togglePaid = togglePaid;

function renderKPIs(){

  const income = transactions
    .filter(t => t.type === "income")
    .reduce((s,t)=>s+Number(t.amount||0),0);

  const expense = transactions
    .filter(t => t.type === "expense")
    .reduce((s,t)=>s+Number(t.amount||0),0);

  const fixed = fixedBills
    .reduce((s,t)=>s+Number(t.amount||0),0);

  document.getElementById("kpis").innerHTML = `
    <div class="kpi">
      <div class="kpi-title">Income</div>
      <div class="kpi-value good">${money(income)}</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Expenses</div>
      <div class="kpi-value bad">${money(expense + fixed)}</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Balance</div>
      <div class="kpi-value">
        ${money(income - expense - fixed)}
      </div>
    </div>
  `;
}

function renderTransactions(){

  const el = document.getElementById("transactions");

  if(!transactions.length){
    el.innerHTML = `<div class="empty">No transactions yet.</div>`;
    return;
  }

  el.innerHTML = transactions.map(t => `
    <div class="item">

      <div>
        <div class="item-title">
          ${t.subtype || "Transaction"}
        </div>

        <div class="item-meta">
          ${money(t.amount)}
          ${t.note ? ` • ${t.note}` : ""}
        </div>
      </div>

    </div>
  `).join("");
}

function renderPaidChecklist(){

  const leftEl = document.getElementById("leftToPay");
  const paidEl = document.getElementById("paidThisMonth");

  const left = [];
  const paid = [];

  fixedBills.forEach(item => {

    const done = isPaid(
      "fixed_expenses",
      item.id
    );

    const html = `
      <div class="item">

        <div>
          <div class="item-title">
            ${item.name}
          </div>

          <div class="item-meta">
            ${money(item.amount)}
          </div>
        </div>

        <button
          class="small-btn ${done ? 'green-btn' : ''}"
          onclick="togglePaid(
            'fixed_expenses',
            '${item.id}',
            ${done}
          )"
        >
          ${done ? 'Paid' : 'Mark Paid'}
        </button>

      </div>
    `;

    if(done){
      paid.push(html);
    } else {
      left.push(html);
    }

  });

  transactions
    .filter(t => t.type === "expense")
    .forEach(item => {

      const done = isPaid(
        "transactions",
        item.id
      );

      const html = `
        <div class="item">

          <div>
            <div class="item-title">
              ${item.subtype || "Expense"}
            </div>

            <div class="item-meta">
              ${money(item.amount)}
              ${item.note ? ` • ${item.note}` : ""}
            </div>
          </div>

          <button
            class="small-btn ${done ? 'green-btn' : ''}"
            onclick="togglePaid(
              'transactions',
              '${item.id}',
              ${done}
            )"
          >
            ${done ? 'Paid' : 'Mark Paid'}
          </button>

        </div>
      `;

      if(done){
        paid.push(html);
      } else {
        left.push(html);
      }

    });

  leftEl.innerHTML =
    left.length
      ? left.join("")
      : `<div class="empty">Everything paid 🎉</div>`;

  paidEl.innerHTML =
    paid.length
      ? paid.join("")
      : `<div class="empty">Nothing paid yet.</div>`;
}

async function load(){

  const user = await getUser();

  if(!user){
    return;
  }

  const [
    txRes,
    fixedRes,
    paidRes
  ] = await Promise.all([

    supabase
      .from("transactions")
      .select("*")
      .eq("user_id", user.id)
      .order("date",{ascending:false}),

    supabase
      .from("fixed_expenses")
      .select("*")
      .eq("user_id", user.id),

    supabase
      .from("monthly_expense_status")
      .select("*")
      .eq("user_id", user.id)

  ]);

  transactions = txRes.data || [];
  fixedBills = fixedRes.data || [];
  paidStatuses = paidRes.data || [];

  renderKPIs();
  renderTransactions();
  renderPaidChecklist();
}

document
.getElementById("saveTransaction")
.addEventListener("click", async ()=>{

  const user = await getUser();

  await supabase
    .from("transactions")
    .insert([{
      user_id:user.id,
      bucket:document.getElementById("bucket").value,
      type:document.getElementById("type").value,
      amount:Number(document.getElementById("amount").value || 0),
      subtype:document.getElementById("subtype").value,
      note:document.getElementById("note").value,
      date:document.getElementById("date").value
    }]);

  load();

});

document
.getElementById("saveBill")
.addEventListener("click", async ()=>{

  const user = await getUser();

  await supabase
    .from("fixed_expenses")
    .insert([{
      user_id:user.id,
      name:document.getElementById("billName").value,
      amount:Number(document.getElementById("billAmount").value || 0),
      is_active:true
    }]);

  load();

});

load();

</script>

</body>
</html>
