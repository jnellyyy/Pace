<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate To Do List</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 24px;
      margin: 0;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
    }

    input, select, button {
      box-sizing: border-box;
      font: inherit;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      background: #0f0f0f;
      color: #fff;
      border: 1px solid #333;
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 10px;
      margin-top: 10px;
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      background: #d41425;
      color: #fff;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .notice {
      color: #bbb;
      margin-top: 10px;
    }

    .section {
      margin-top: 24px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 10px;
    }

    .task-check {
      width: 18px;
      height: 18px;
      margin: 0;
      flex: 0 0 auto;
    }

    .task-text {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
    }

    .task-text.done {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .delete-btn {
      width: 32px;
      height: 32px;
      min-width: 32px;
      padding: 0;
      margin: 0;
      border-radius: 999px;
      background: #333;
      color: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .delete-btn:hover {
      background: #4a4a4a;
    }

    .empty-text {
      color: #888;
      font-size: 14px;
      padding: 4px 0 0;
    }

    @media (max-width: 640px) {
      .top-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Ultimate To Do List</h2>

      <div class="top-row">
        <input id="taskInput" placeholder="Enter task" />
        <select id="taskCategory">
          <option value="Life">Life</option>
          <option value="House">House</option>
          <option value="Money">Money</option>
          <option value="Business">Business</option>
          <option value="Work">Work</option>
        </select>
      </div>

      <button class="add-btn" onclick="addTask()">Add Task</button>

      <p id="msg" class="notice"></p>

      <div id="taskSections"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      "https://grgagroautlpphjsjpjh.supabase.co",
      "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      }
    );

    const taskInput = document.getElementById("taskInput");
    const taskCategory = document.getElementById("taskCategory");
    const msg = document.getElementById("msg");
    const taskSections = document.getElementById("taskSections");

    const sectionOrder = ["Life", "House", "Money", "Business", "Work"];

    async function getUser() {
      const { data } = await supabase.auth.getUser();
      return data.user;
    }

    window.addTask = async function () {
      const user = await getUser();
      const title = taskInput.value.trim();
      const category = taskCategory.value;

      if (!user) {
        msg.textContent = "Not logged in.";
        return;
      }

      if (!title) {
        msg.textContent = "Enter a task.";
        return;
      }

      const { error } = await supabase.from("tasks").insert([{
        user_id: user.id,
        title,
        category,
        status: "open"
      }]);

      if (error) {
        msg.textContent = error.message;
        return;
      }

      taskInput.value = "";
      msg.textContent = "";
      loadTasks();
    };

    window.toggleTask = async function (id, status) {
      const newStatus = status === "done" ? "open" : "done";

      const { error } = await supabase
        .from("tasks")
        .update({ status: newStatus })
        .eq("id", id);

      if (error) {
        msg.textContent = error.message;
        return;
      }

      loadTasks();
    };

    window.deleteTask = async function (id) {
      const { error } = await supabase
        .from("tasks")
        .delete()
        .eq("id", id);

      if (error) {
        msg.textContent = error.message;
        return;
      }

      loadTasks();
    };

    async function loadTasks() {
      const user = await getUser();

      if (!user) {
        taskSections.innerHTML = '<div class="notice">Not logged in.</div>';
        return;
      }

      const { data, error } = await supabase
        .from("tasks")
        .select("*")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      const tasks = data || [];

      taskSections.innerHTML = sectionOrder.map(section => {
        const sectionTasks = tasks.filter(task => (task.category || "Life") === section);

        return `
          <div class="section">
            <div class="section-title">${section}</div>
            ${
              sectionTasks.length === 0
                ? `<div class="empty-text">No tasks yet.</div>`
                : sectionTasks.map(task => `
                    <div class="task-row">
                      <input
                        class="task-check"
                        type="checkbox"
                        ${task.status === "done" ? "checked" : ""}
                        onchange="toggleTask('${task.id}','${task.status}')"
                      />
                      <div class="task-text ${task.status === "done" ? "done" : ""}">
                        ${task.title}
                      </div>
                      <button
                        class="delete-btn"
                        onclick="deleteTask('${task.id}')"
                        aria-label="Delete task"
                        title="Delete"
                      >
                        ×
                      </button>
                    </div>
                  `).join("")
            }
          </div>
        `;
      }).join("");
    }

    loadTasks();
  </script>
</body>
</html>
