<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance</title>

<style>
:root {
  --bg:#111;
  --card:#1b1b1b;
  --line:#333;
  --text:#fff;
  --muted:#aaa;
  --office:#16a34a;
  --wfh:#2563eb;
  --sick:#dc2626;
  --holiday:#ca8a04;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  padding:24px;
  margin:0;
}

.wrap{max-width:900px;margin:0 auto;}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:20px;
  margin-top:16px;
}

/* KPI */
.stats-box{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
}

.stat{
  background:#222;
  border:1px solid #333;
  border-radius:10px;
  padding:10px 14px;
  min-width:140px;
}

.stat-title{
  font-size:12px;
  color:#aaa;
}

.stat-value{
  font-size:18px;
  font-weight:700;
}

.status-on{ color:#16a34a; }
.status-off{ color:#ca8a04; }
.status-bad{ color:#dc2626; }

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

button{
  background:#d41425;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

button.secondary{ background:#333; }

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.dow{
  text-align:center;
  font-size:12px;
  color:#aaa;
}

.day{
  background:#222;
  border:1px solid #333;
  border-radius:10px;
  min-height:80px;
  padding:8px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.day.office{ border-color:var(--office); }
.day.wfh{ border-color:var(--wfh); }
.day.sick{ border-color:var(--sick); }
.day.holiday{ border-color:var(--holiday); }

.day-number{ font-weight:700; }
.day-status{ font-size:11px; color:#aaa; }

.notice{ color:#aaa; margin-top:10px; }

</style>
</head>
<body>

<div class="wrap">

  <!-- KPI -->
  <div class="card">
    <div id="stats"></div>
  </div>

  <!-- CALENDAR -->
  <div class="card">
    <div class="topbar">
      <h2 id="monthTitle"></h2>
      <div>
        <button class="secondary" onclick="changeMonth(-1)">Prev</button>
        <button class="secondary" onclick="goToday()">Today</button>
        <button class="secondary" onclick="changeMonth(1)">Next</button>
      </div>
    </div>

    <div class="calendar" id="calendar"></div>
    <p class="notice" id="msg"></p>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");
const msg = document.getElementById("msg");

let currentDate = new Date();
let attendanceMap = {};

const order = ["blank","Office","WFH","Sick","Holiday"];

/* HELPERS */
function formatDate(d){
  return d.toISOString().split("T")[0];
}

function getUser(){
  return supabase.auth.getUser().then(res=>res.data.user);
}

function getPeriod(){
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate()-27);
  return {start,end};
}

/* KPI */
function countOffice(){
  let count=0;
  const {start,end}=getPeriod();

  for(const d in attendanceMap){
    const date=new Date(d);
    if(date>=start && date<=end && attendanceMap[d]==="Office"){
      count++;
    }
  }
  return count;
}

function getStatus(n){
  if(n>=12) return {t:"On track",c:"status-on"};
  if(n>=10) return {t:"Off track",c:"status-off"};
  return {t:"Not met",c:"status-bad"};
}

function renderStats(){
  const stats=document.getElementById("stats");
  const {start,end}=getPeriod();
  const count=countOffice();
  const status=getStatus(count);

  stats.innerHTML=`
    <div class="stats-box">
      <div class="stat">
        <div class="stat-title">Period</div>
        <div class="stat-value">
          ${start.toLocaleDateString()} - ${end.toLocaleDateString()}
        </div>
      </div>

      <div class="stat">
        <div class="stat-title">Office Days</div>
        <div class="stat-value">${count}</div>
      </div>

      <div class="stat">
        <div class="stat-title">Target</div>
        <div class="stat-value">12</div>
      </div>

      <div class="stat">
        <div class="stat-title">Status</div>
        <div class="stat-value ${status.c}">${status.t}</div>
      </div>
    </div>
  `;
}

/* LOAD */
async function load(){
  const user=await getUser();
  if(!user){ msg.textContent="Not logged in"; return;}

  const {data}=await supabase
    .from("attendance")
    .select("*")
    .eq("user_id",user.id);

  attendanceMap={};
  (data||[]).forEach(r=>{
    attendanceMap[r.entry_date]=r.status;
  });

  renderCalendar();
  renderStats();
}

/* CALENDAR */
function renderCalendar(){
  calendar.innerHTML="";

  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  days.forEach(d=>{
    const el=document.createElement("div");
    el.className="dow";
    el.textContent=d;
    calendar.appendChild(el);
  });

  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();

  monthTitle.textContent=currentDate.toLocaleString("default",{month:"long",year:"numeric"});

  const first=new Date(y,m,1);
  let offset=first.getDay();
  offset = offset===0?6:offset-1;

  for(let i=0;i<offset;i++){
    calendar.appendChild(document.createElement("div"));
  }

  const last=new Date(y,m+1,0).getDate();

  for(let d=1;d<=last;d++){
    const date=new Date(y,m,d);
    const key=formatDate(date);
    const status=attendanceMap[key]||"blank";

    const cell=document.createElement("div");
    cell.className="day "+status.toLowerCase();

    cell.onclick=()=>cycle(key,status);

    cell.innerHTML=`
      <div class="day-number">${d}</div>
      <div class="day-status">${status==="blank"?"":status}</div>
    `;

    calendar.appendChild(cell);
  }
}

/* CLICK */
async function cycle(date,status){
  const user=await getUser();
  if(!user) return;

  const next=order[(order.indexOf(status)+1)%order.length];

  if(next==="blank"){
    await supabase.from("attendance").delete().eq("entry_date",date);
    delete attendanceMap[date];
  } else {
    if(attendanceMap[date]){
      await supabase.from("attendance").update({status:next}).eq("entry_date",date);
    } else {
      await supabase.from("attendance").insert([{entry_date:date,status:next,user_id:user.id}]);
    }
    attendanceMap[date]=next;
  }

  renderCalendar();
  renderStats();
}

/* NAV */
window.changeMonth=(n)=>{
  currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+n,1);
  renderCalendar();
};

window.goToday=()=>{
  currentDate=new Date();
  renderCalendar();
};

/* INIT */
load();
</script>

</body>
</html>
