<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Pace Church Notes</title>

<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,0.06);
  --panel-strong:rgba(255,255,255,0.10);
  --line:rgba(255,255,255,0.12);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --accent:#ff3b30;
  --gold:#f7c948;
  --green:#22c55e;
  --blue:#60a5fa;
  --purple:#a78bfa;
  --shadow:0 20px 50px rgba(0,0,0,0.35);
  --radius:26px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  color-scheme:dark;
}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,59,48,0.22), transparent 35%),
    radial-gradient(circle at top right, rgba(167,139,250,0.15), transparent 30%),
    linear-gradient(145deg,var(--bg1),var(--bg2));
  color:var(--text);
  padding:16px;
}

.app{
  max-width:1180px;
  margin:0 auto;
  min-height:calc(100vh - 32px);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}

.logo{
  width:44px;
  height:44px;
  border-radius:16px;
  background:linear-gradient(145deg,rgba(255,255,255,0.16),rgba(255,255,255,0.04));
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow);
  font-weight:900;
  font-size:21px;
  letter-spacing:-1px;
}

.brand h1{
  margin:0;
  font-size:22px;
  letter-spacing:-0.6px;
  white-space:nowrap;
}

.brand p{
  margin:2px 0 0;
  color:var(--muted);
  font-size:13px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.dashboard-link{
  text-decoration:none;
  color:var(--text);
  background:rgba(255,59,48,0.14);
  border:1px solid rgba(255,59,48,0.25);
  padding:11px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
  white-space:nowrap;
}

.hero{
  background:linear-gradient(145deg,rgba(255,255,255,0.10),rgba(255,255,255,0.04));
  border:1px solid var(--line);
  border-radius:32px;
  padding:17px;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-columns:0.9fr 1.3fr;
  gap:14px;
  align-items:center;
}

.hero h2{
  margin:0;
  font-size:27px;
  letter-spacing:-1px;
  line-height:1;
}

.hero p{
  margin:8px 0 0;
  color:var(--muted);
  line-height:1.35;
  font-size:13px;
}

.verse-box{
  background:rgba(0,0,0,0.24);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:24px;
  padding:13px;
}

.verse-box label{
  display:block;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  margin-bottom:7px;
}

.verse-row{
  display:flex;
  gap:8px;
}

.version-grid{
  display:flex;
  gap:7px;
  flex-wrap:wrap;
  margin-top:10px;
}

.version-btn{
  padding:9px 11px;
  font-size:12px;
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.10);
}

.version-btn.active{
  background:rgba(255,59,48,0.22);
  border-color:rgba(255,59,48,0.42);
  color:var(--text);
}

.verse-actions{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.main{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:1.15fr 0.85fr;
  gap:14px;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
  min-height:0;
}

.card h3{
  margin:0 0 12px;
  font-size:17px;
  letter-spacing:-0.3px;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
  overflow:auto;
}

.tab-btn{
  border:none;
  outline:none;
  cursor:pointer;
  border-radius:999px;
  padding:10px 13px;
  font-family:inherit;
  font-weight:900;
  font-size:13px;
  color:var(--muted);
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.09);
  white-space:nowrap;
}

.tab-btn.active{
  color:var(--text);
  background:rgba(255,59,48,0.18);
  border-color:rgba(255,59,48,0.30);
}

.tab-panel{
  display:none;
}

.tab-panel.active{
  display:block;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:11px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.field.full{
  grid-column:1 / -1;
}

label{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
  letter-spacing:0.2px;
}

input,
select,
textarea{
  width:100%;
  border:none;
  outline:none;
  border-radius:17px;
  padding:12px 13px;
  background:rgba(0,0,0,0.26);
  color:var(--text);
  border:1px solid rgba(255,255,255,0.10);
  font-size:15px;
  font-family:inherit;
}

textarea{
  min-height:118px;
  resize:vertical;
  line-height:1.45;
}

textarea.big{
  min-height:210px;
}

input::placeholder,
textarea::placeholder{
  color:rgba(167,175,190,0.70);
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

button{
  border:none;
  outline:none;
  cursor:pointer;
  border-radius:999px;
  padding:12px 15px;
  font-family:inherit;
  font-weight:900;
  font-size:14px;
  color:var(--text);
  background:rgba(255,255,255,0.10);
  border:1px solid var(--line);
}

button.primary{
  background:var(--accent);
  border-color:rgba(255,59,48,0.7);
}

button.soft{
  background:rgba(255,255,255,0.08);
}

button.gold{
  background:rgba(247,201,72,0.16);
  border-color:rgba(247,201,72,0.28);
}

button.purple{
  background:rgba(167,139,250,0.16);
  border-color:rgba(167,139,250,0.28);
}

button.danger{
  background:rgba(239,68,68,0.18);
  border-color:rgba(239,68,68,0.28);
}

.search-row{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.search-row input{
  flex:1;
}

.notes-list{
  display:flex;
  flex-direction:column;
  gap:11px;
  max-height:calc(100vh - 295px);
  overflow:auto;
  padding-right:3px;
}

.note-item{
  background:rgba(0,0,0,0.22);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:22px;
  padding:14px;
}

.note-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:8px;
}

.note-title{
  font-weight:900;
  font-size:15px;
  line-height:1.25;
}

.note-date{
  color:var(--muted);
  font-size:12px;
  white-space:nowrap;
}

.note-meta{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:8px 0 10px;
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 9px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.note-preview{
  color:rgba(245,247,251,0.82);
  font-size:13px;
  line-height:1.4;
  margin:0 0 12px;
}

.note-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.note-actions button{
  padding:9px 11px;
  font-size:12px;
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:24px 12px;
  border:1px dashed rgba(255,255,255,0.14);
  border-radius:22px;
}

.stat-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

.toast{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  background:rgba(20,22,27,0.96);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:999px;
  padding:12px 16px;
  box-shadow:var(--shadow);
  font-size:14px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:0.25s ease;
  z-index:20;
}

.toast.show{
  opacity:1;
  bottom:28px;
}

@media(max-width:880px){
  .hero{
    grid-template-columns:1fr;
  }

  .main{
    grid-template-columns:1fr;
  }

  .notes-list{
    max-height:none;
  }
}

@media(max-width:620px){
  body{
    padding:13px;
  }

  .topbar{
    align-items:flex-start;
  }

  .brand h1{
    font-size:20px;
  }

  .brand p{
    max-width:210px;
  }

  .dashboard-link{
    padding:10px 12px;
  }

  .hero h2{
    font-size:25px;
  }

  .verse-row{
    flex-direction:column;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .field.full{
    grid-column:auto;
  }

  textarea.big{
    min-height:180px;
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="logo">P</div>
      <div>
        <h1>Church Notes</h1>
        <p>Weekly service notes, scriptures, prayer points and action steps.</p>
      </div>
    </div>

    <a class="dashboard-link" href="dashboard.html">Go Dashboard</a>
  </div>

  <section class="hero">
    <div>
      <h2>Keep what God is teaching you.</h2>
      <p>
        Type a verse, pick your version, open it, then save your notes in one place.
      </p>
    </div>

    <div class="verse-box">
      <label for="verseLookup">Verse lookup</label>

      <div class="verse-row">
        <input id="verseLookup" placeholder="Example: Romans 8:28">
        <button class="primary" type="button" onclick="openSelectedVerse()">Open</button>
      </div>

      <div class="version-grid" id="versionGrid"></div>

      <div class="verse-actions">
        <button class="purple" type="button" onclick="addVerseToNotes()">Add reference to note</button>
        <button class="soft" type="button" onclick="copyVerseLink()">Copy verse link</button>
      </div>
    </div>
  </section>

  <main class="main">

    <section class="card">
      <div class="stat-line">
        <span id="formTitle">New service note</span>
        <span id="totalNotes">0 saved</span>
      </div>

      <form id="noteForm">
        <input type="hidden" id="noteId">

        <div class="tabs">
          <button class="tab-btn active" type="button" onclick="showTab('serviceTab', this)">Service</button>
          <button class="tab-btn" type="button" onclick="showTab('notesTab', this)">Notes</button>
          <button class="tab-btn" type="button" onclick="showTab('reflectTab', this)">Reflect</button>
        </div>

        <div id="serviceTab" class="tab-panel active">
          <div class="form-grid">

            <div class="field">
              <label for="serviceDate">Service date</label>
              <input type="date" id="serviceDate" required>
            </div>

            <div class="field">
              <label for="serviceType">Service type</label>
              <select id="serviceType">
                <option>Sunday Service</option>
                <option>Midweek Service</option>
                <option>Bible Study</option>
                <option>Prayer Meeting</option>
                <option>Conference</option>
                <option>Youth Service</option>
                <option>Other</option>
              </select>
            </div>

            <div class="field">
              <label for="preacher">Preacher</label>
              <input id="preacher" placeholder="Example: Pastor, Bishop, Guest speaker">
            </div>

            <div class="field">
              <label for="theme">Main theme</label>
              <input id="theme" placeholder="Example: Faith, obedience, prayer">
            </div>

            <div class="field full">
              <label for="title">Message title</label>
              <input id="title" placeholder="Example: The Power of Sacrifice" required>
            </div>

            <div class="field full">
              <label for="scriptures">Scriptures mentioned</label>
              <textarea id="scriptures" placeholder="Add Bible verses here. Example: Romans 8:28, Psalm 23, John 15:5"></textarea>
            </div>

          </div>
        </div>

        <div id="notesTab" class="tab-panel">
          <div class="field">
            <label for="mainNotes">Main notes</label>
            <textarea class="big" id="mainNotes" placeholder="Write the main points from the message. Keep it simple and clear."></textarea>
          </div>
        </div>

        <div id="reflectTab" class="tab-panel">
          <div class="form-grid">

            <div class="field full">
              <label for="revelation">What stood out to me?</label>
              <textarea id="revelation" placeholder="What hit your spirit? What made you think? What felt personal?"></textarea>
            </div>

            <div class="field full">
              <label for="prayer">Prayer from this message</label>
              <textarea id="prayer" placeholder="Lord, help me to..."></textarea>
            </div>

            <div class="field full">
              <label for="actionStep">Action step this week</label>
              <textarea id="actionStep" placeholder="What am I going to do differently this week?"></textarea>
            </div>

          </div>
        </div>

        <div class="actions">
          <button class="primary" type="submit">Save note</button>
          <button class="soft" type="button" onclick="resetForm()">Clear form</button>
          <button class="gold" type="button" onclick="showTabById('serviceTab')">Back to service</button>
        </div>
      </form>
    </section>

    <aside class="card">
      <h3>Saved notes</h3>

      <div class="search-row">
        <input id="searchInput" placeholder="Search notes, scripture or theme">
      </div>

      <div class="notes-list" id="notesList">
        <div class="empty">No notes saved yet.</div>
      </div>
    </aside>

  </main>

</div>

<div class="toast" id="toast">Saved</div>

<script>
const STORAGE_KEY = "paceChurchNotesV1";
const SELECTED_VERSION_KEY = "paceChurchNotesSelectedVersionV1";

const favouriteVersions = [
  { code:"KJV", label:"KJV" },
  { code:"AMP", label:"AMP" },
  { code:"AMPC", label:"AMPC" },
  { code:"NLT", label:"NLT" },
  { code:"ESV", label:"ESV" },
  { code:"TLB", label:"TLB" },
  { code:"EASY", label:"EASY" },
  { code:"ICB", label:"ICB" },
  { code:"CJB", label:"CJB" }
];

let selectedVersion = localStorage.getItem(SELECTED_VERSION_KEY) || "AMP";

const noteForm = document.getElementById("noteForm");
const noteId = document.getElementById("noteId");
const serviceDate = document.getElementById("serviceDate");
const serviceType = document.getElementById("serviceType");
const preacher = document.getElementById("preacher");
const theme = document.getElementById("theme");
const title = document.getElementById("title");
const scriptures = document.getElementById("scriptures");
const mainNotes = document.getElementById("mainNotes");
const revelation = document.getElementById("revelation");
const prayer = document.getElementById("prayer");
const actionStep = document.getElementById("actionStep");
const notesList = document.getElementById("notesList");
const searchInput = document.getElementById("searchInput");
const totalNotes = document.getElementById("totalNotes");
const formTitle = document.getElementById("formTitle");
const toast = document.getElementById("toast");
const verseLookup = document.getElementById("verseLookup");
const versionGrid = document.getElementById("versionGrid");

function todayISO(){
  const today = new Date();
  const offset = today.getTimezoneOffset();
  const localDate = new Date(today.getTime() - offset * 60000);
  return localDate.toISOString().slice(0,10);
}

function getNotes(){
  try{
    const notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    return Array.isArray(notes) ? notes : [];
  }catch(error){
    return [];
  }
}

function saveNotes(notes){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

function makeId(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function showToast(message){
  toast.textContent = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1600);
}

function cleanText(value){
  return value.trim();
}

function formatDate(value){
  if(!value) return "No date";

  const date = new Date(value + "T00:00:00");

  return date.toLocaleDateString("en-GB", {
    weekday:"short",
    day:"numeric",
    month:"short",
    year:"numeric"
  });
}

function shorten(value, maxLength = 135){
  if(!value) return "No notes added yet.";

  const text = value.replace(/\s+/g, " ").trim();

  if(text.length <= maxLength) return text;

  return text.slice(0, maxLength) + "...";
}

function renderVersionButtons(){
  versionGrid.innerHTML = favouriteVersions.map(version => {
    const activeClass = version.code === selectedVersion ? "active" : "";

    return `
      <button class="version-btn ${activeClass}" type="button" onclick="selectVersion('${version.code}')">
        ${version.label}
      </button>
    `;
  }).join("");
}

function selectVersion(versionCode){
  selectedVersion = versionCode;
  localStorage.setItem(SELECTED_VERSION_KEY, selectedVersion);
  renderVersionButtons();
  showToast(versionCode + " selected");
}

function makeBibleGatewayUrl(versionCode){
  const verse = verseLookup.value.trim();

  if(!verse){
    showToast("Type a verse first");
    return "";
  }

  return "https://www.biblegateway.com/passage/?search=" + encodeURIComponent(verse) + "&version=" + versionCode;
}

function openSelectedVerse(){
  const url = makeBibleGatewayUrl(selectedVersion);

  if(!url) return;

  window.open(url, "_blank", "noopener,noreferrer");
}

function addVerseToNotes(){
  const verse = verseLookup.value.trim();

  if(!verse){
    showToast("Type a verse first");
    return;
  }

  const verseText = verse + " " + selectedVersion;
  const current = scriptures.value.trim();

  if(current){
    scriptures.value = current + "\n" + verseText;
  } else {
    scriptures.value = verseText;
  }

  showTabById("serviceTab");
  showToast("Verse added");
}

function copyVerseLink(){
  const url = makeBibleGatewayUrl(selectedVersion);

  if(!url) return;

  navigator.clipboard.writeText(url).then(() => {
    showToast("Verse link copied");
  });
}

function renderNotes(){
  const notes = getNotes();
  const query = searchInput.value.toLowerCase().trim();

  totalNotes.textContent = notes.length === 1 ? "1 saved" : notes.length + " saved";

  const filteredNotes = notes
    .filter(note => {
      const joined = [
        note.serviceDate,
        note.serviceType,
        note.preacher,
        note.theme,
        note.title,
        note.scriptures,
        note.mainNotes,
        note.revelation,
        note.prayer,
        note.actionStep
      ].join(" ").toLowerCase();

      return joined.includes(query);
    })
    .sort((a,b) => {
      return new Date(b.serviceDate || 0) - new Date(a.serviceDate || 0);
    });

  if(filteredNotes.length === 0){
    notesList.innerHTML = `<div class="empty">No matching notes found.</div>`;
    return;
  }

  notesList.innerHTML = filteredNotes.map(note => {
    return `
      <article class="note-item">
        <div class="note-head">
          <div class="note-title">${escapeHtml(note.title || "Untitled service")}</div>
          <div class="note-date">${formatDate(note.serviceDate)}</div>
        </div>

        <div class="note-meta">
          <span class="pill">${escapeHtml(note.serviceType || "Service")}</span>
          ${note.preacher ? `<span class="pill">${escapeHtml(note.preacher)}</span>` : ""}
          ${note.theme ? `<span class="pill">${escapeHtml(note.theme)}</span>` : ""}
        </div>

        <p class="note-preview">${escapeHtml(shorten(note.mainNotes || note.revelation || note.scriptures))}</p>

        <div class="note-actions">
          <button class="gold" onclick="editNote('${note.id}')">Edit</button>
          <button class="soft" onclick="copyNote('${note.id}')">Copy</button>
          <button class="purple" onclick="openFirstScripture('${note.id}')">Open verse</button>
          <button class="danger" onclick="deleteNote('${note.id}')">Delete</button>
        </div>
      </article>
    `;
  }).join("");
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function showTab(tabId, button){
  document.querySelectorAll(".tab-panel").forEach(panel => {
    panel.classList.remove("active");
  });

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  document.getElementById(tabId).classList.add("active");
  button.classList.add("active");
}

function showTabById(tabId){
  const buttonMap = {
    serviceTab:0,
    notesTab:1,
    reflectTab:2
  };

  const buttons = document.querySelectorAll(".tab-btn");

  document.querySelectorAll(".tab-panel").forEach(panel => {
    panel.classList.remove("active");
  });

  buttons.forEach(btn => {
    btn.classList.remove("active");
  });

  document.getElementById(tabId).classList.add("active");
  buttons[buttonMap[tabId]].classList.add("active");
}

noteForm.addEventListener("submit", function(event){
  event.preventDefault();

  const notes = getNotes();
  const existingId = noteId.value;

  const noteData = {
    id: existingId || makeId(),
    serviceDate: serviceDate.value,
    serviceType: serviceType.value,
    preacher: cleanText(preacher.value),
    theme: cleanText(theme.value),
    title: cleanText(title.value),
    scriptures: cleanText(scriptures.value),
    mainNotes: cleanText(mainNotes.value),
    revelation: cleanText(revelation.value),
    prayer: cleanText(prayer.value),
    actionStep: cleanText(actionStep.value),
    updatedAt: new Date().toISOString()
  };

  if(existingId){
    const updatedNotes = notes.map(note => {
      return note.id === existingId ? noteData : note;
    });

    saveNotes(updatedNotes);
    showToast("Note updated");
  } else {
    notes.push(noteData);
    saveNotes(notes);
    showToast("Note saved");
  }

  resetForm();
  renderNotes();
});

function editNote(id){
  const notes = getNotes();
  const note = notes.find(item => item.id === id);

  if(!note) return;

  noteId.value = note.id;
  serviceDate.value = note.serviceDate || todayISO();
  serviceType.value = note.serviceType || "Sunday Service";
  preacher.value = note.preacher || "";
  theme.value = note.theme || "";
  title.value = note.title || "";
  scriptures.value = note.scriptures || "";
  mainNotes.value = note.mainNotes || "";
  revelation.value = note.revelation || "";
  prayer.value = note.prayer || "";
  actionStep.value = note.actionStep || "";

  formTitle.textContent = "Edit service note";
  showTabById("serviceTab");

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });
}

function deleteNote(id){
  const confirmed = confirm("Delete this church note?");

  if(!confirmed) return;

  const notes = getNotes().filter(note => note.id !== id);
  saveNotes(notes);
  renderNotes();
  showToast("Note deleted");
}

function openFirstScripture(id){
  const notes = getNotes();
  const note = notes.find(item => item.id === id);

  if(!note || !note.scriptures){
    showToast("No scripture saved");
    return;
  }

  const firstLine = note.scriptures.split("\n")[0].trim();

  if(!firstLine){
    showToast("No scripture saved");
    return;
  }

  const parts = firstLine.split(" ");
  const lastPart = parts[parts.length - 1];

  const versionCodes = favouriteVersions.map(version => version.code);

  if(versionCodes.includes(lastPart)){
    selectedVersion = lastPart;
    localStorage.setItem(SELECTED_VERSION_KEY, selectedVersion);
    parts.pop();
  }

  verseLookup.value = parts.join(" ");
  renderVersionButtons();
  openSelectedVerse();
}

function copyNote(id){
  const notes = getNotes();
  const note = notes.find(item => item.id === id);

  if(!note) return;

  const text = `
Church Notes

Date: ${formatDate(note.serviceDate)}
Service: ${note.serviceType || ""}
Preacher: ${note.preacher || ""}
Theme: ${note.theme || ""}
Title: ${note.title || ""}

Scriptures:
${note.scriptures || ""}

Main Notes:
${note.mainNotes || ""}

What Stood Out:
${note.revelation || ""}

Prayer:
${note.prayer || ""}

Action Step:
${note.actionStep || ""}
  `.trim();

  navigator.clipboard.writeText(text).then(() => {
    showToast("Note copied");
  });
}

function resetForm(){
  noteForm.reset();
  noteId.value = "";
  serviceDate.value = todayISO();
  serviceType.value = "Sunday Service";
  formTitle.textContent = "New service note";
  showTabById("serviceTab");
}

searchInput.addEventListener("input", renderNotes);

verseLookup.addEventListener("keydown", function(event){
  if(event.key === "Enter"){
    openSelectedVerse();
  }
});

serviceDate.value = todayISO();
renderVersionButtons();
renderNotes();
</script>

</body>
</html>
