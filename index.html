<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Ops</title>
<style>
:root{
  --bg:#0d0d0f;
  --card:#17171b;
  --card2:#1f1f25;
  --line:#2c2c34;
  --text:#f4f4f5;
  --muted:#a1a1aa;
  --accent:#d31324;
  --accent-dark:#b10f1e;
  --button:#2a2a31;
  --success:#22c55e;
  --danger:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#0b0b0d 0%, #121216 100%);
  color:var(--text);
  font-family:Arial,sans-serif;
  padding:20px;
}
.wrap{max-width:860px;margin:0 auto}
.card{
  background:rgba(23,23,27,.96);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-top:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.22);
}
h1,h2,h3,p{margin-top:0}
.sub,.meta,.notice,.empty{color:var(--muted)}
.input,.select,.button{width:100%;border-radius:12px;font:inherit}
.input,.select{
  padding:13px 14px;
  margin-top:10px;
  background:#101014;
  color:var(--text);
  border:1px solid #30303a;
}
.button{
  padding:13px 14px;
  margin-top:10px;
  border:none;
  cursor:pointer;
  font-weight:700;
  background:var(--accent);
  color:#fff;
}
.button:hover{background:var(--accent-dark)}
.button.secondary{background:var(--button)}
.button.secondary:hover{background:#35353e}
.hidden{display:none !important}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}
.logout-btn{
  width:auto;
  margin-top:0;
  padding:10px 14px;
}
.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:16px;
}
.tab-btn{
  background:var(--button);
  color:#fff;
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}
.tab-btn.active{background:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.task-form{
  display:grid;
  grid-template-columns:1.2fr .8fr .8fr auto;
  gap:10px;
  align-items:end;
}
.task-form .button{
  width:auto;
  min-width:130px;
  margin-top:0;
}
.task-list{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.task-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:14px;
  border-radius:14px;
  background:var(--card2);
  border:1px solid #2f2f38;
}
.task-left{
  display:flex;
  align-items:flex-start;
  gap:12px;
  flex:1;
  min-width:0;
}
.task-checkbox{
  width:20px;
  height:20px;
  margin:2px 0 0 0;
  accent-color:var(--accent);
  flex:0 0 auto;
}
.task-title{
  font-size:16px;
  line-height:1.35;
  word-break:break-word;
}
.task-title.done{
  text-decoration:line-through;
  opacity:.55;
}
.task-sub{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
}
.task-right{
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.small-btn{
  width:auto;
  margin:0;
  padding:9px 12px;
  border-radius:10px;
  background:#34343d;
  color:#fff;
  border:none;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}
.small-btn.delete{
  background:#3a2023;
}
.small-btn.delete:hover{
  background:#4a2529;
}
.placeholder{
  color:var(--muted);
  padding:8px 0;
}
@media (max-width:760px){
  .tabs{grid-template-columns:repeat(2,1fr)}
  .task-form{grid-template-columns:1fr}
  .task-form .button{width:100%}
  .task-right{flex-direction:column}
}
</style>
</head>
<body>
<div class="wrap">

  <div id="authBox" class="card">
    <h1>Life Ops</h1>
    <p class="sub">Sign in once and it should keep you in.</p>
    <input id="email" class="input" type="email" placeholder="Email">
    <input id="password" class="input" type="password" placeholder="Password">
    <button id="signUpBtn" class="button" type="button">Sign Up</button>
    <button id="signInBtn" class="button secondary" type="button">Sign In</button>
    <p id="msg" class="notice"></p>
  </div>

  <div id="appBox" class="hidden">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 style="margin-bottom:6px;">Life Ops</h1>
          <p id="sessionText" class="meta">Signed in</p>
        </div>
        <button id="logoutBtn" class="button secondary logout-btn" type="button">Log out</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" type="button" data-tab="life">Life</button>
        <button class="tab-btn" type="button" data-tab="finance">Finance</button>
        <button class="tab-btn" type="button" data-tab="attendance">Attendance</button>
        <button class="tab-btn" type="button" data-tab="bookings">Bookings</button>
      </div>
    </div>

    <div id="life" class="card tab-panel active">
      <h2>To do</h2>
      <p class="sub">Add, tick off, and delete tasks.</p>

      <div class="task-form">
        <input id="taskInput" class="input" placeholder="Add task">
        <select id="taskArea" class="select">
          <option value="life">Life</option>
          <option value="business">Business</option>
        </select>
        <input id="taskCategory" class="input" placeholder="Category">
        <button id="addTaskBtn" class="button" type="button">Add task</button>
      </div>

      <p id="taskMsg" class="notice"></p>
      <div id="taskList" class="task-list"></div>
    </div>

    <div id="finance" class="card tab-panel">
      <h2>Finance</h2>
      <p class="placeholder">Finance tab comes next.</p>
    </div>

    <div id="attendance" class="card tab-panel">
      <h2>Attendance</h2>
      <p class="placeholder">Attendance tab comes next.</p>
    </div>

    <div id="bookings" class="card tab-panel">
      <h2>Bookings</h2>
      <p class="placeholder">Bookings tab comes next.</p>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");
const msg = document.getElementById("msg");
const sessionText = document.getElementById("sessionText");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const signUpBtn = document.getElementById("signUpBtn");
const signInBtn = document.getElementById("signInBtn");
const logoutBtn = document.getElementById("logoutBtn");

const taskInput = document.getElementById("taskInput");
const taskArea = document.getElementById("taskArea");
const taskCategory = document.getElementById("taskCategory");
const addTaskBtn = document.getElementById("addTaskBtn");
const taskMsg = document.getElementById("taskMsg");
const taskList = document.getElementById("taskList");

function setAuthMessage(text){
  msg.textContent = text;
}

function setTaskMessage(text){
  taskMsg.textContent = text;
}

async function getCurrentUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function showTabByName(tabName){
  document.querySelectorAll(".tab-panel").forEach(panel => {
    panel.classList.remove("active");
    panel.style.display = "none";
  });

  const selected = document.getElementById(tabName);
  if (selected) {
    selected.style.display = "block";
    selected.classList.add("active");
  }

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tabName);
  });
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => showTabByName(btn.dataset.tab));
});

async function showAppForSession(){
  const { data } = await supabase.auth.getSession();
  const session = data.session;

  if(session){
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    sessionText.textContent = session.user?.email || "Signed in";
    await loadTasks();
  } else {
    appBox.classList.add("hidden");
    authBox.classList.remove("hidden");
  }
}

signUpBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if(!email || !password){
    setAuthMessage("Enter email and password.");
    return;
  }

  const { error } = await supabase.auth.signUp({ email, password });
  setAuthMessage(error ? error.message : "Signed up. Now sign in.");
});

signInBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if(!email || !password){
    setAuthMessage("Enter email and password.");
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    setAuthMessage(error.message);
    return;
  }

  setAuthMessage("");
  await showAppForSession();
});

logoutBtn.addEventListener("click", async () => {
  await supabase.auth.signOut();
  location.reload();
});

addTaskBtn.addEventListener("click", async () => {
  const user = await getCurrentUser();
  const title = taskInput.value.trim();
  const area = taskArea.value;
  const category = taskCategory.value.trim() || "General";

  if(!user){
    setTaskMessage("You are not signed in.");
    return;
  }

  if(!title){
    setTaskMessage("Enter a task.");
    return;
  }

  const { error } = await supabase
    .from("tasks")
    .insert([{
      user_id: user.id,
      title,
      area,
      category,
      priority: "medium",
      status: "open"
    }]);

  if(error){
    setTaskMessage(error.message);
    return;
  }

  taskInput.value = "";
  taskCategory.value = "";
  setTaskMessage("");
  await loadTasks();
});

window.toggleTask = async function(id, currentStatus){
  const nextStatus = currentStatus === "done" ? "open" : "done";

  const { error } = await supabase
    .from("tasks")
    .update({ status: nextStatus })
    .eq("id", id);

  if(error){
    setTaskMessage(error.message);
    return;
  }

  await loadTasks();
};

window.deleteTask = async function(id){
  const { error } = await supabase
    .from("tasks")
    .delete()
    .eq("id", id);

  if(error){
    setTaskMessage(error.message);
    return;
  }

  await loadTasks();
};

async function loadTasks(){
  const user = await getCurrentUser();

  if(!user){
    taskList.innerHTML = `<div class="empty">Sign in to see tasks.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("tasks")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  if(error){
    setTaskMessage(error.message);
    return;
  }

  if(!data || data.length === 0){
    taskList.innerHTML = `<div class="empty">No tasks yet.</div>`;
    return;
  }

  taskList.innerHTML = data.map(task => `
    <div class="task-row">
      <div class="task-left">
        <input
          class="task-checkbox"
          type="checkbox"
          ${task.status === "done" ? "checked" : ""}
          onchange="toggleTask('${task.id}','${task.status}')"
        >
        <div>
          <div class="task-title ${task.status === "done" ? "done" : ""}">${task.title || ""}</div>
          <div class="task-sub">${task.area || "life"} · ${task.category || "General"}</div>
        </div>
      </div>
      <div class="task-right">
        <button class="small-btn delete" type="button" onclick="deleteTask('${task.id}')">Delete</button>
      </div>
    </div>
  `).join("");
}

supabase.auth.onAuthStateChange(async () => {
  await showAppForSession();
});

showAppForSession();
</script>
</body>
</html>
