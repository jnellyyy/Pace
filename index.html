<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png">
<meta name="theme-color" content="#0f1115">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pace Sign in</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 24px;
      margin: 0;
    }

    .card {
      max-width: 420px;
      margin: 40px auto;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 6px;
    }

    .sub {
      color: #bbb;
      margin-bottom: 14px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      font: inherit;
    }

    input {
      background: #0f0f0f;
      color: #fff;
      border: 1px solid #333;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      background: #d41425;
      color: #fff;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary {
      background: #333;
    }

    #msg {
      white-space: pre-wrap;
      color: #bbb;
      margin-top: 12px;
      min-height: 40px;
    }

    @media (max-width: 600px) {
      .btn-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pace</h1>
    <div class="sub">sign in to keep the pace.</div>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <div class="btn-row">
      <button id="signInBtn" type="button">Sign In</button>
      <button id="signUpBtn" class="secondary" type="button">Sign Up</button>
    </div>

    <p id="msg"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      "https://grgagroautlpphjsjpjh.supabase.co",
      "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          storage: localStorage
        }
      }
    );

    const msg = document.getElementById("msg");
    const email = document.getElementById("email");
    const password = document.getElementById("password");

    function setMsg(text) {
      msg.textContent = text;
    }

    async function goIfLoggedIn() {
      const { data, error } = await supabase.auth.getSession();

      if (error) {
        setMsg("Session error:\n" + error.message);
        return;
      }

      if (data.session) {
        window.location.href = "dashboard.html";
      }
    }

    document.getElementById("signInBtn").addEventListener("click", async () => {
      setMsg("Trying sign in...");

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email.value.trim(),
          password: password.value
        });

        if (error) {
          setMsg("Sign in error:\n" + error.message);
          return;
        }

        if (!data.session) {
          setMsg("Sign in failed: no session returned.");
          return;
        }

        setMsg("Sign in ok. Redirecting...");
        window.location.href = "dashboard.html";
      } catch (err) {
        setMsg("Catch error:\n" + err.message);
      }
    });

    document.getElementById("signUpBtn").addEventListener("click", async () => {
      setMsg("Creating account...");

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email.value.trim(),
          password: password.value
        });

        if (error) {
          setMsg("Sign up error:\n" + error.message);
          return;
        }

        setMsg(
          "Sign up ok.\n" +
          "User created: " + (data.user ? "yes" : "no") + "\n" +
          "Now sign in."
        );
      } catch (err) {
        setMsg("Catch error:\n" + err.message);
      }
    });

    await goIfLoggedIn();
  </script>
</body>
</html>
