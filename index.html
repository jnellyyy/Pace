<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">
<meta name="theme-color" content="#0f1115">

<title>Pace</title>

<style>
body{
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#0f1115;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:420px;
  background:#1a1d23;
  padding:24px;
  border-radius:20px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
}

.brand img{
  width:44px;
  height:44px;
  border-radius:12px;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#2a2f36;
  color:#fff;
}

button{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff3b30;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="splash" style="position:fixed;inset:0;background:#0f1115;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <img src="/Pace/icon-192.png" style="width:80px;border-radius:20px;">
</div>

<div class="card" id="app" style="opacity:0;transition:0.4s;">
  <div class="brand">
    <img src="/Pace/icon-192.png">
    <div>
      <strong>Pace</strong><br>
      <small>Your personal system</small>
    </div>
  </div>

  <h2>Sign in</h2>

  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">

  <button id="btn">Continue</button>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("app").style.opacity=1;
},700);

document.getElementById("btn").onclick = async () => {
  const email = email.value;
  const password = password.value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
    return;
  }

  window.location.href = "dashboard.html";
};
</script>

</body>
</html>
