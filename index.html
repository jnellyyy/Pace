<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Ops Build 1</title>
<style>
  :root{
    --bg:#111214;
    --card:#1a1c20;
    --line:#2c2f36;
    --text:#f4f4f5;
    --muted:#a1a1aa;
    --accent:#d41425;
    --accent2:#2b2e36;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    background:linear-gradient(180deg,#0d0e10 0%, #15171b 100%);
    color:var(--text);
    font-family:Arial,sans-serif;
    padding:20px;
  }

  .wrap{
    max-width:860px;
    margin:0 auto;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    margin-top:18px;
  }

  h1,h2,p{margin-top:0}

  .sub,.notice,.meta{
    color:var(--muted);
  }

  .input,.button{
    width:100%;
    font:inherit;
    border-radius:12px;
    box-sizing:border-box;
  }

  .input{
    background:#101216;
    color:var(--text);
    border:1px solid #31343c;
    padding:13px 14px;
    margin-top:10px;
  }

  .button{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:13px 14px;
    margin-top:10px;
    font-weight:700;
    cursor:pointer;
  }

  .button.secondary{
    background:var(--accent2);
  }

  .hidden{
    display:none !important;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    flex-wrap:wrap;
  }

  .logout-btn{
    width:auto;
    margin-top:0;
    padding:10px 14px;
  }

  .tabs{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:16px;
  }

  .tab-btn{
    background:var(--accent2);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:700;
    cursor:pointer;
  }

  .tab-btn.active{
    background:var(--accent);
  }

  .tab-panel{
    display:none;
  }

  .tab-panel.active{
    display:block;
  }

  @media (max-width:760px){
    .tabs{
      grid-template-columns:repeat(2,1fr);
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <div id="authBox" class="card">
    <h1>Life Ops</h1>
    <p class="sub">Build 1. Sign in once, then the app shell opens.</p>

    <input id="email" class="input" type="email" placeholder="Email">
    <input id="password" class="input" type="password" placeholder="Password">

    <button id="signUpBtn" class="button" type="button">Sign Up</button>
    <button id="signInBtn" class="button secondary" type="button">Sign In</button>

    <p id="msg" class="notice"></p>
  </div>

  <div id="appBox" class="hidden">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 style="margin-bottom:6px;">Life Ops</h1>
          <p id="sessionText" class="meta">Signed in</p>
        </div>
        <button id="logoutBtn" class="button secondary logout-btn" type="button">Log out</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" type="button" data-tab="life">Life</button>
        <button class="tab-btn" type="button" data-tab="finance">Finance</button>
        <button class="tab-btn" type="button" data-tab="attendance">Attendance</button>
        <button class="tab-btn" type="button" data-tab="bookings">Bookings</button>
      </div>
    </div>

    <div id="life" class="card tab-panel active">
      <h2>Life</h2>
      <p class="sub">Signed in successfully.</p>
    </div>

    <div id="finance" class="card tab-panel">
      <h2>Finance</h2>
      <p class="sub">Finance tab ready.</p>
    </div>

    <div id="attendance" class="card tab-panel">
      <h2>Attendance</h2>
      <p class="sub">Attendance tab ready.</p>
    </div>

    <div id="bookings" class="card tab-panel">
      <h2>Bookings</h2>
      <p class="sub">Bookings tab ready.</p>
    </div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");
const msgEl = document.getElementById("msg");
const sessionText = document.getElementById("sessionText");

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");

function setMsg(text){
  msgEl.textContent = text;
}

function showTab(tabName){
  document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));

  const panel = document.getElementById(tabName);
  const button = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);

  if(panel) panel.classList.add("active");
  if(button) button.classList.add("active");
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => showTab(btn.dataset.tab));
});

async function renderAuthState(){
  const { data } = await supabase.auth.getSession();
  const session = data.session;

  if(session){
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    sessionText.textContent = session.user?.email || "Signed in";
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
    sessionText.textContent = "";
  }
}

document.getElementById("signUpBtn").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passwordEl.value.trim();

  if(!email || !password){
    setMsg("Enter email and password.");
    return;
  }

  const { error } = await supabase.auth.signUp({ email, password });
  setMsg(error ? `Sign up error: ${error.message}` : "Signed up. Now sign in.");
});

document.getElementById("signInBtn").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passwordEl.value.trim();

  if(!email || !password){
    setMsg("Enter email and password.");
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    setMsg(`Sign in error: ${error.message}`);
    return;
  }

  if(!data.session){
    setMsg("Sign in error: no session returned.");
    return;
  }

  setMsg("Signed in.");
  await renderAuthState();
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  const { error } = await supabase.auth.signOut();

  if(error){
    setMsg(`Sign out error: ${error.message}`);
    return;
  }

  setMsg("Signed out.");
  await renderAuthState();
});

supabase.auth.onAuthStateChange(async () => {
  await renderAuthState();
});

await renderAuthState();
</script>
</body>
</html>
