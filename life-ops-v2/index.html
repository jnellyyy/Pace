<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Ops</title>

<style>
body{background:#0e0e0e;color:#fff;font-family:Arial;padding:20px;margin:0}
.wrap{max-width:700px;margin:auto}
.card{background:#1b1b1b;padding:20px;border-radius:12px;margin-top:20px}
input,button,select{width:100%;padding:12px;margin-top:10px;border-radius:8px}
input,select{background:#111;color:#fff;border:1px solid #333}
button{background:#c1121f;color:#fff;border:none;font-weight:700}
.hidden{display:none}
.tabs{display:flex;gap:8px;margin-top:10px}
.tabs button{flex:1;background:#333}
.tabs .active{background:#c1121f}
.item{padding:10px 0;border-bottom:1px solid #333}
.small{color:#bbb}
</style>

</head>
<body>

<div class="wrap">

<!-- LOGIN -->
<div id="authBox" class="card">
<h1>Life Ops</h1>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Sign In</button>
<p id="msg"></p>
</div>

<!-- APP -->
<div id="appBox" class="hidden">

<div class="card">
<h2>Dashboard</h2>
<button onclick="logout()">Log out</button>

<div class="tabs">
<button class="active" onclick="showTab('life',this)">Life</button>
<button onclick="showTab('finance',this)">Finance</button>
<button onclick="showTab('attendance',this)">Attendance</button>
<button onclick="showTab('bookings',this)">Bookings</button>
</div>
</div>

<!-- LIFE -->
<div id="life" class="card tab">
<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add Task</button>
<p id="taskMsg" class="small"></p>
<div id="taskList"></div>
</div>

<!-- FINANCE -->
<div id="finance" class="card tab hidden">
<input id="amount" placeholder="Amount">
<input id="category" placeholder="Category">
<button onclick="addFinance()">Save</button>
<div id="financeList"></div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="card tab hidden">
<input type="date" id="attDate">
<select id="attStatus">
<option>Office</option>
<option>WFH</option>
<option>Sick</option>
<option>Holiday</option>
</select>
<button onclick="addAttendance()">Save</button>
<div id="attList"></div>
</div>

<!-- BOOKINGS -->
<div id="bookings" class="card tab hidden">
<input id="client" placeholder="Client">
<select id="status">
<option>Enquiry</option>
<option>Pending</option>
<option>Booked</option>
<option>Completed</option>
</select>
<button onclick="addBooking()">Save</button>
<div id="bookList"></div>
</div>

</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
"https://grgagroautlpphjsjpjh.supabase.co",
"sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

/* TABS */
window.showTab=(t,b)=>{
document.querySelectorAll('.tab').forEach(x=>x.classList.add('hidden'));
document.getElementById(t).classList.remove('hidden');
document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
b.classList.add('active');
}

/* AUTH */
window.signUp=async()=>{
const {error}=await supabase.auth.signUp({
email:email.value,
password:password.value
});
msg.innerText=error?error.message:"Signed up → now sign in";
}

window.signIn=async()=>{
const {error}=await supabase.auth.signInWithPassword({
email:email.value,
password:password.value
});
if(error){msg.innerText=error.message;return;}
authBox.classList.add("hidden");
appBox.classList.remove("hidden");
loadAll();
}

window.logout=async()=>{
await supabase.auth.signOut();
location.reload();
}

/* LOAD ALL */
async function loadAll(){
loadTasks();
loadFinance();
loadAttendance();
loadBookings();
}

/* TASKS (FIXED) */
window.addTask = async () => {
  const user = (await supabase.auth.getUser()).data.user;

  const value = taskInput.value.trim();

  if (!value) {
    alert("Enter a task");
    return;
  }

  const { error } = await supabase
    .from("tasks")
    .insert([
      {
        user_id: user.id,
        title: value,
        area: "life",
        category: "General",
        priority: "medium",
        status: "open"
      }
    ]);

  if (error) {
    alert(error.message);
    return;
  }

  taskInput.value = "";
  loadTasks();
};

async function loadTasks() {
  const { data, error } = await supabase
    .from("tasks")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert(error.message);
    return;
  }

  taskList.innerHTML =
    data.map(t => `<div class="item">${t.title}</div>`).join("");
}

/* FINANCE */
window.addFinance=async()=>{
const user=(await supabase.auth.getUser()).data.user;
await supabase.from('finance').insert({
user_id:user.id,
amount:amount.value,
category:category.value
});
loadFinance();
}

async function loadFinance(){
const {data}=await supabase.from('finance').select('*');
financeList.innerHTML=data.map(f=>`<div class="item">£${f.amount} - ${f.category}</div>`).join("");
}

/* ATTENDANCE */
window.addAttendance=async()=>{
const user=(await supabase.auth.getUser()).data.user;
await supabase.from('attendance').insert({
user_id:user.id,
date:attDate.value,
status:attStatus.value
});
loadAttendance();
}

async function loadAttendance(){
const {data}=await supabase.from('attendance').select('*');
attList.innerHTML=data.map(a=>`<div class="item">${a.date} - ${a.status}</div>`).join("");
}

/* BOOKINGS */
window.addBooking=async()=>{
const user=(await supabase.auth.getUser()).data.user;
await supabase.from('bookings').insert({
user_id:user.id,
name:client.value,
status:status.value
});
loadBookings();
}

async function loadBookings(){
const {data}=await supabase.from('bookings').select('*');
bookList.innerHTML=data.map(b=>`<div class="item">${b.name} - ${b.status}</div>`).join("");
}
</script>

</body>
</html>
