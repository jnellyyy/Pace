<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pace Quiet Time</title>

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.12);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --accent:#ff3b30;
  --green:#22c55e;
  --gold:#f59e0b;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  padding:18px;
  background:
    radial-gradient(circle at top left, rgba(245,158,11,.12), transparent 28%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}

.wrap{
  max-width:820px;
  margin:0 auto;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  margin-top:16px;
  backdrop-filter:blur(18px);
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.back-btn{
  padding:10px 14px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:#fff;
  text-decoration:none;
  font-weight:800;
}

h1{
  margin:0;
  font-size:36px;
  letter-spacing:-.06em;
}

.muted{
  color:var(--muted);
  line-height:1.5;
}

.verse{
  font-size:24px;
  line-height:1.45;
  font-weight:750;
  letter-spacing:-.03em;
}

.ref{
  margin-top:12px;
  color:var(--gold);
  font-weight:800;
}

.prompt{
  font-size:18px;
  line-height:1.5;
}

textarea{
  width:100%;
  min-height:160px;
  margin-top:10px;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:#fff;
  font:inherit;
  resize:vertical;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-weight:900;
  font:inherit;
}

button.done{
  background:var(--green);
}

.status{
  min-height:18px;
  color:var(--muted);
  font-size:13px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <div class="topbar">
      <div>
        <h1>Quiet Time</h1>
        <p class="muted">A small daily prompt to help you return to prayer, Scripture and seeking God.</p>
      </div>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </div>
  </div>

  <div class="card">
    <div class="muted">Today’s Scripture</div>
    <div class="verse" id="verseText"></div>
    <div class="ref" id="verseRef"></div>
  </div>

  <div class="card">
    <div class="muted">Reflection</div>
    <p class="prompt" id="reflectionText"></p>
  </div>

  <div class="card">
    <div class="muted">Prayer focus</div>
    <p class="prompt" id="prayerText"></p>
  </div>

  <div class="card">
    <div class="muted">Quiet time notes</div>
    <textarea id="notes" placeholder="Write what stood out, what you prayed about, or what God is teaching you..."></textarea>

    <button id="completeBtn">I read / prayed today</button>
    <button onclick="saveNotes()">Save notes</button>

    <div id="status" class="status"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      storage:localStorage
    }
  }
);

const verses = [
  {
    text:"Seek first God’s Kingdom, and his righteousness; and all these things will be given to you as well.",
    ref:"Matthew 6:33",
    reflection:"Before you rush into the day, return your focus to God first.",
    prayer:"Lord, help me seek You before I seek answers, progress or control."
  },
  {
    text:"Your word is a lamp to my feet, and a light for my path.",
    ref:"Psalm 119:105",
    reflection:"God does not always show the whole road, but He gives light for the next step.",
    prayer:"Lord, guide my next step and teach me to trust Your timing."
  },
  {
    text:"Cast your burden on Yahweh, and he will sustain you.",
    ref:"Psalm 55:22",
    reflection:"You were not created to carry everything alone.",
    prayer:"Lord, I give You what feels too heavy for me today."
  },
  {
    text:"Be still, and know that I am God.",
    ref:"Psalm 46:10",
    reflection:"Stillness is not laziness. Sometimes it is obedience.",
    prayer:"Lord, quiet my mind so I can hear You clearly."
  },
  {
    text:"The joy of Yahweh is your strength.",
    ref:"Nehemiah 8:10",
    reflection:"Your strength does not have to come from pressure. It can come from joy in God.",
    prayer:"Lord, restore my joy and strengthen me from within."
  },
  {
    text:"Draw near to God, and he will draw near to you.",
    ref:"James 4:8",
    reflection:"God is not far from you. Return to Him one honest prayer at a time.",
    prayer:"Lord, help me draw near again, without shame or delay."
  },
  {
    text:"I can do all things through Christ, who strengthens me.",
    ref:"Philippians 4:13",
    reflection:"This is not about doing everything. It is about being strengthened for what God has assigned.",
    prayer:"Lord, give me strength for today’s assignment."
  }
];

const verseText = document.getElementById("verseText");
const verseRef = document.getElementById("verseRef");
const reflectionText = document.getElementById("reflectionText");
const prayerText = document.getElementById("prayerText");
const notesEl = document.getElementById("notes");
const completeBtn = document.getElementById("completeBtn");
const statusEl = document.getElementById("status");

let user = null;
let todayLog = null;

function today(){
  return new Date().toISOString().split("T")[0];
}

function dailyIndex(){
  const start = new Date("2026-01-01");
  const now = new Date(today());
  const diff = Math.floor((now - start) / 86400000);
  return Math.abs(diff) % verses.length;
}

function setStatus(text){
  statusEl.textContent = text;
}

function renderDaily(){
  const item = verses[dailyIndex()];
  verseText.textContent = item.text;
  verseRef.textContent = item.ref;
  reflectionText.textContent = item.reflection;
  prayerText.textContent = item.prayer;
}

async function load(){
  const { data } = await supabase.auth.getUser();
  user = data.user;

  if(!user){
    window.location.href = "index.html";
    return;
  }

  renderDaily();

  const { data: log, error } = await supabase
    .from("quiet_time_logs")
    .select("*")
    .eq("user_id", user.id)
    .eq("entry_date", today())
    .maybeSingle();

  if(error){
    setStatus(error.message);
    return;
  }

  todayLog = log;

  if(todayLog?.notes){
    notesEl.value = todayLog.notes;
  }

  if(todayLog?.completed){
    completeBtn.textContent = "Completed today ✓";
    completeBtn.classList.add("done");
  }
}

async function ensureLog(){
  if(todayLog) return todayLog;

  const { data, error } = await supabase
    .from("quiet_time_logs")
    .insert([{
      user_id:user.id,
      entry_date:today(),
      completed:false,
      notes:""
    }])
    .select()
    .single();

  if(error){
    setStatus(error.message);
    return null;
  }

  todayLog = data;
  return data;
}

completeBtn.onclick = async function(){
  const log = await ensureLog();
  if(!log) return;

  const { error } = await supabase
    .from("quiet_time_logs")
    .update({
      completed:true,
      notes:notesEl.value.trim()
    })
    .eq("id", log.id);

  if(error){
    setStatus(error.message);
    return;
  }

  completeBtn.textContent = "Completed today ✓";
  completeBtn.classList.add("done");
  setStatus("Quiet time marked complete.");
};

window.saveNotes = async function(){
  const log = await ensureLog();
  if(!log) return;

  const { error } = await supabase
    .from("quiet_time_logs")
    .update({
      notes:notesEl.value.trim()
    })
    .eq("id", log.id);

  if(error){
    setStatus(error.message);
    return;
  }

  setStatus("Notes saved.");
}

load();
</script>
</body>
</html>
