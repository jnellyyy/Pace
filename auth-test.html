<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 24px;
      margin: 0;
    }

    .card {
      max-width: 420px;
      margin: 40px auto;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      font: inherit;
    }

    input {
      background: #0f0f0f;
      color: #fff;
      border: 1px solid #333;
    }

    button {
      background: #d41425;
      color: #fff;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    #msg {
      white-space: pre-wrap;
      color: #bbb;
      margin-top: 12px;
      min-height: 40px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Auth Test</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signInBtn" type="button">Sign In</button>
    <button id="sessionBtn" type="button">Check Session</button>
    <button id="signOutBtn" type="button">Sign Out</button>

    <p id="msg"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      "https://grgagroautlpphjsjpjh.supabase.co",
      "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          storage: localStorage
        }
      }
    );

    const msg = document.getElementById("msg");
    const email = document.getElementById("email");
    const password = document.getElementById("password");

    function setMsg(text) {
      msg.textContent = text;
    }

    document.getElementById("signInBtn").addEventListener("click", async () => {
      setMsg("Trying sign in...");

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email.value.trim(),
          password: password.value
        });

        if (error) {
          setMsg("Sign in error:\n" + error.message);
          return;
        }

        setMsg(
          "Sign in ok.\n" +
          "Session returned: " + (data.session ? "yes" : "no") + "\n" +
          "User returned: " + (data.user ? "yes" : "no")
        );
      } catch (err) {
        setMsg("Catch error:\n" + err.message);
      }
    });

    document.getElementById("sessionBtn").addEventListener("click", async () => {
      try {
        const { data, error } = await supabase.auth.getSession();

        if (error) {
          setMsg("Session error:\n" + error.message);
          return;
        }

        setMsg(
          "Session present: " + (data.session ? "yes" : "no") + "\n" +
          "Email: " + (data.session?.user?.email || "none")
        );
      } catch (err) {
        setMsg("Catch error:\n" + err.message);
      }
    });

    document.getElementById("signOutBtn").addEventListener("click", async () => {
      try {
        const { error } = await supabase.auth.signOut();

        if (error) {
          setMsg("Sign out error:\n" + error.message);
          return;
        }

        setMsg("Signed out.");
      } catch (err) {
        setMsg("Catch error:\n" + err.message);
      }
    });
  </script>
</body>
</html>
