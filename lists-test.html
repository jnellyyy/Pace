<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pace Lists</title>

<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --panel3:rgba(255,255,255,0.12);
  --line:rgba(255,255,255,0.12);
  --line2:rgba(255,255,255,0.08);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --soft:#d9dee8;
  --accent:#ff3b30;
  --green:#22c55e;
  --blue:#60a5fa;
  --amber:#f59e0b;
  --red:#ef4444;
  --shadow:0 24px 70px rgba(0,0,0,0.42);
  --radius:28px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  max-width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  min-height:100dvh;
  padding:18px;
  padding-bottom:96px;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(circle at 12% 0%, rgba(255,59,48,0.16), transparent 32%),
    radial-gradient(circle at 90% 8%, rgba(96,165,250,0.10), transparent 30%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
}

button,
input,
textarea{
  font:inherit;
}

button{
  cursor:pointer;
}

.page{
  width:100%;
  max-width:1220px;
  margin:0 auto;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:14px;
}

.brand-block{
  display:flex;
  align-items:center;
  gap:12px;
}

.app-dot{
  width:44px;
  height:44px;
  border-radius:16px;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.32), transparent 28%),
    linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 14px 35px rgba(0,0,0,0.25);
  font-weight:900;
}

.eyebrow{
  margin:0;
  color:var(--muted);
  font-size:12px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  font-weight:800;
}

h1{
  margin:2px 0 0;
  font-size:28px;
  letter-spacing:-0.04em;
  line-height:1.05;
}

.top-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.back-btn,
.icon-btn{
  width:auto;
  min-width:46px;
  min-height:46px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:11px 14px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.10);
  color:#fff;
  text-decoration:none;
  font-weight:850;
  font-size:14px;
}

.icon-btn{
  font-size:22px;
  padding:0 14px;
}

.back-btn:hover,
.icon-btn:hover{
  background:rgba(255,255,255,0.12);
}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.045));
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  backdrop-filter:blur(22px);
}

.overview{
  padding:14px;
}

.kpis{
  display:grid;
  grid-template-columns:2fr repeat(4, 1fr);
  gap:12px;
}

.summary-card,
.kpi{
  background:rgba(255,255,255,0.07);
  border:1px solid var(--line2);
  border-radius:24px;
  padding:16px;
  min-height:112px;
  position:relative;
  overflow:hidden;
}

.summary-card:before{
  content:"";
  position:absolute;
  inset:auto -60px -80px auto;
  width:190px;
  height:190px;
  border-radius:999px;
  background:rgba(255,59,48,0.16);
  filter:blur(2px);
}

.kpi-title{
  font-size:12px;
  color:var(--muted);
  font-weight:750;
}

.kpi-value{
  font-size:24px;
  font-weight:900;
  margin-top:5px;
  letter-spacing:-0.03em;
}

.kpi-sub{
  color:var(--muted);
  font-size:12px;
  margin-top:6px;
  line-height:1.35;
}

.hero-number{
  font-size:34px;
  font-weight:950;
  letter-spacing:-0.05em;
  margin-top:4px;
}

.progress{
  height:8px;
  border-radius:999px;
  background:rgba(255,255,255,0.10);
  overflow:hidden;
  margin-top:14px;
}

.progress span{
  display:block;
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg, var(--accent), #ff7b72);
}

.mini-line{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:10px;
  color:var(--muted);
  font-size:12px;
  position:relative;
  z-index:1;
}

.panel{
  margin-top:14px;
  padding:16px;
}

.panel-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.panel-title{
  margin:0;
  font-size:18px;
  letter-spacing:-0.02em;
}

.panel-copy{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}

.search-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  margin-bottom:14px;
}

input,
textarea,
button{
  width:100%;
  min-height:46px;
  padding:12px 13px;
  border-radius:16px;
  background:rgba(255,255,255,0.065);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  outline:none;
}

input:focus,
textarea:focus{
  border-color:rgba(255,59,48,0.55);
  box-shadow:0 0 0 4px rgba(255,59,48,0.10);
}

input::placeholder,
textarea::placeholder{
  color:#919aaa;
}

textarea{
  min-height:130px;
  resize:vertical;
  line-height:1.45;
}

.primary-btn{
  border:0;
  border-radius:18px;
  background:linear-gradient(135deg, var(--accent), #ff675d);
  color:#fff;
  font-weight:900;
  margin-top:12px;
  box-shadow:0 16px 35px rgba(255,59,48,0.20);
}

.secondary-btn{
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.09);
  color:#fff;
  font-weight:850;
  margin-top:10px;
}

.danger-btn{
  background:rgba(239,68,68,0.20);
  border:1px solid rgba(239,68,68,0.22);
  color:#fff;
  font-weight:850;
  margin-top:12px;
}

.add-inline{
  width:auto;
  min-width:46px;
  margin:0;
  font-size:22px;
  padding:0 16px;
  border-radius:16px;
  background:linear-gradient(135deg, var(--accent), #ff675d);
  border:0;
  box-shadow:0 16px 35px rgba(255,59,48,0.20);
}

.grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
  gap:14px;
}

.note-card{
  min-width:0;
  cursor:pointer;
  background:rgba(255,255,255,0.065);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:24px;
  padding:12px;
  transition:transform 0.18s ease, background 0.18s ease;
}

.note-card:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.085);
}

.preview{
  width:100%;
  aspect-ratio:1.35 / 1;
  min-height:126px;
  border-radius:18px;
  background:
    radial-gradient(circle at 20% 0%, rgba(255,59,48,0.10), transparent 45%),
    rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.11);
  padding:12px;
  overflow:hidden;
}

.preview-title{
  font-size:13px;
  font-weight:920;
  margin-bottom:8px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:-0.02em;
}

.preview-section{
  font-size:10px;
  font-weight:900;
  color:#fff;
  margin-top:7px;
  text-transform:lowercase;
}

.preview-line{
  font-size:11px;
  color:var(--soft);
  line-height:1.45;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.note-title{
  margin-top:12px;
  font-size:16px;
  font-weight:900;
  line-height:1.16;
  text-align:left;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  word-break:break-word;
  letter-spacing:-0.02em;
}

.note-date{
  color:var(--muted);
  font-size:13px;
  margin-top:5px;
}

.note-meta{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:10px;
}

.chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 9px;
  border-radius:999px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--soft);
  font-size:12px;
  font-weight:750;
}

.chip.done{
  background:rgba(34,197,94,0.14);
  border-color:rgba(34,197,94,0.22);
  color:#d7ffdf;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.72);
  display:none;
  align-items:flex-end;
  z-index:10;
}

.sheet{
  width:100%;
  max-height:92dvh;
  overflow:auto;
  background:
    radial-gradient(circle at 10% 0%, rgba(255,59,48,0.10), transparent 34%),
    linear-gradient(180deg, #171a20, #101217);
  border-radius:30px 30px 0 0;
  padding:18px;
  border-top:1px solid var(--line);
  box-shadow:0 -24px 80px rgba(0,0,0,0.45);
}

.sheet-inner{
  width:100%;
  max-width:780px;
  margin:0 auto;
}

.sheet-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.sheet-handle{
  width:46px;
  height:5px;
  border-radius:999px;
  background:rgba(255,255,255,0.20);
  margin:0 auto 12px;
}

.close-btn{
  width:46px;
  height:46px;
  min-height:46px;
  border-radius:16px;
  padding:0;
  margin:0;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.10);
  font-size:22px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.field{
  display:block;
}

.field span{
  display:block;
  font-size:12px;
  color:var(--muted);
  font-weight:750;
  margin:0 0 7px;
}

.divider{
  height:1px;
  background:rgba(255,255,255,0.08);
  margin:18px 0;
}

.section-title{
  margin-top:18px;
  margin-bottom:8px;
  font-size:14px;
  font-weight:950;
  color:#fff;
  text-transform:lowercase;
  letter-spacing:-0.01em;
}

.item-row{
  background:rgba(255,255,255,0.065);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:13px;
  margin-top:9px;
  display:flex;
  align-items:flex-start;
  gap:10px;
  cursor:pointer;
}

.check{
  width:30px;
  height:30px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.14);
  background:rgba(255,255,255,0.065);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
  font-weight:900;
}

.check.done{
  background:var(--green);
  border-color:rgba(34,197,94,0.45);
}

.item-text{
  flex:1;
  min-width:0;
  line-height:1.4;
  word-break:break-word;
  font-size:14px;
  font-weight:760;
}

.item-text.done{
  text-decoration:line-through;
  color:var(--muted);
}

.item-date{
  color:#d7eaff;
  background:rgba(96,165,250,0.12);
  border:1px solid rgba(96,165,250,0.20);
  width:max-content;
  max-width:100%;
  border-radius:999px;
  font-size:12px;
  margin-top:7px;
  padding:5px 8px;
}

.delete-small{
  width:auto;
  min-height:34px;
  padding:7px 10px;
  border-radius:12px;
  background:rgba(239,68,68,0.18);
  border:1px solid rgba(239,68,68,0.22);
  margin-top:0;
  font-size:12px;
  font-weight:850;
  flex:0 0 auto;
}

.status{
  color:var(--soft);
  min-height:18px;
  font-size:13px;
  margin-top:10px;
}

.empty{
  color:var(--muted);
  padding:14px 0;
  font-size:13px;
}

@media(max-width:980px){
  .kpis{
    grid-template-columns:1fr 1fr;
  }

  .summary-card{
    grid-column:1 / -1;
  }
}

@media(max-width:680px){
  body{
    padding:12px;
    padding-bottom:96px;
  }

  .topbar{
    align-items:flex-start;
  }

  h1{
    font-size:24px;
  }

  .kpis,
  .form-grid,
  .search-row{
    grid-template-columns:1fr;
  }

  .add-inline{
    width:100%;
  }

  .grid{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:12px;
  }

  .preview{
    min-height:116px;
  }

  .note-card{
    border-radius:22px;
    padding:10px;
  }

  .item-row{
    flex-direction:column;
  }

  .delete-small{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="page">

  <header class="topbar">
    <div class="brand-block">
      <div class="app-dot">P</div>
      <div>
        <p class="eyebrow">Pace</p>
        <h1>Lists</h1>
      </div>
    </div>

    <div class="top-actions">
      <a href="dashboard.html" class="back-btn">‹ Dashboard</a>
      <button type="button" class="icon-btn" onclick="openNew()">＋</button>
    </div>
  </header>

  <section class="card overview">
    <div class="kpis" id="kpis"></div>
  </section>

  <section class="card panel">
    <div class="panel-head">
      <div>
        <h2 class="panel-title">Saved lists</h2>
        <p class="panel-copy">Checklists, wedding prep, errands, projects and anything you need to break down.</p>
      </div>
    </div>

    <div class="search-row">
      <input id="search" placeholder="Search list, section or item" oninput="render()">
      <button type="button" class="add-inline" onclick="openNew()">＋</button>
    </div>

    <div class="grid" id="notesGrid"></div>
  </section>

</div>

<div class="modal" id="modal">
  <div class="sheet">
    <div class="sheet-inner">

      <div class="sheet-handle"></div>

      <div class="sheet-top">
        <div>
          <p class="eyebrow">List editor</p>
          <h1 style="font-size:24px;">Edit list</h1>
        </div>

        <button type="button" class="close-btn" onclick="closeModal()">×</button>
      </div>

      <label class="field">
        <span>Main list title</span>
        <input id="listTitle" placeholder="Marvin and Blessing Wedding">
      </label>

      <button type="button" class="primary-btn" onclick="saveListTitle()">Save main list title</button>

      <div class="divider"></div>

      <label class="field">
        <span>Quick import</span>
        <textarea id="quickPasteList" placeholder="Paste a section here, for example:

admin

• pre consultation form completed
• both client emails received
• docusign contract sent"></textarea>
      </label>

      <div class="form-grid">
        <label class="field">
          <span>Section reminder date</span>
          <input id="sectionReminderDate" type="date">
        </label>

        <label class="field">
          <span>Section reminder time</span>
          <input id="sectionReminderTime" type="time">
        </label>
      </div>

      <button type="button" class="secondary-btn" onclick="importSection()">Import section</button>

      <div id="itemsWrap" style="margin-top:16px;"></div>

      <div class="divider"></div>

      <div class="form-grid">
        <label class="field">
          <span>Section</span>
          <input id="newSectionName" placeholder="admin, payments, gear">
        </label>

        <label class="field">
          <span>Checklist item</span>
          <input id="newItemText" placeholder="Add checklist item">
        </label>
      </div>

      <div class="form-grid">
        <label class="field">
          <span>Item reminder date</span>
          <input id="itemReminderDate" type="date">
        </label>

        <label class="field">
          <span>Item reminder time</span>
          <input id="itemReminderTime" type="time">
        </label>
      </div>

      <button type="button" class="primary-btn" onclick="addItem()">Add item</button>
      <button type="button" class="danger-btn" onclick="deleteList()">Delete whole list</button>

      <div id="status" class="status"></div>

    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      storage:localStorage
    }
  }
);

const notesGrid = document.getElementById("notesGrid");
const modal = document.getElementById("modal");
const listTitle = document.getElementById("listTitle");
const quickPasteList = document.getElementById("quickPasteList");
const sectionReminderDate = document.getElementById("sectionReminderDate");
const sectionReminderTime = document.getElementById("sectionReminderTime");
const newSectionName = document.getElementById("newSectionName");
const newItemText = document.getElementById("newItemText");
const itemReminderDate = document.getElementById("itemReminderDate");
const itemReminderTime = document.getElementById("itemReminderTime");
const itemsWrap = document.getElementById("itemsWrap");
const searchEl = document.getElementById("search");
const statusEl = document.getElementById("status");
const kpisEl = document.getElementById("kpis");

let user = null;
let lists = [];
let items = [];
let reminders = [];
let activeId = null;

function setStatus(text){
  statusEl.textContent = text;
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function escapeHTML(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function today(){
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, "0");
  const day = String(now.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function formatDate(value){
  if(!value) return "";
  const raw = String(value).includes("T") ? String(value).split("T")[0] : value;
  return new Date(raw + "T00:00:00").toLocaleDateString("en-GB");
}

function formatReminder(reminder){
  if(!reminder) return "";

  const date = reminder.reminder_date ? formatDate(reminder.reminder_date) : "";
  const time = reminder.reminder_time ? String(reminder.reminder_time).slice(0,5) : "";

  return `${date}${date && time ? " · " : ""}${time}`;
}

function cleanBullet(line){
  return line
    .replace(/^[-*•◦▪▫‣]\s*/, "")
    .replace(/^\[[ xX]\]\s*/, "")
    .trim();
}

function itemsFor(listId){
  return items.filter(i => i.list_id === listId);
}

function reminderForItem(itemId){
  return reminders.find(r => r.source === "list" && r.source_id === itemId);
}

function groupItems(listId){
  const grouped = {};

  itemsFor(listId).forEach(item => {
    const section = item.section || "general";

    if(!grouped[section]){
      grouped[section] = [];
    }

    grouped[section].push(item);
  });

  return grouped;
}

function filteredLists(){
  const q = searchEl.value.toLowerCase().trim();

  if(!q) return lists;

  return lists.filter(list => {
    const listItems = itemsFor(list.id);

    return (
      (list.title || "").toLowerCase().includes(q) ||
      listItems.some(item =>
        (item.text || "").toLowerCase().includes(q) ||
        (item.section || "").toLowerCase().includes(q)
      )
    );
  });
}

function renderKpis(){
  const totalLists = lists.length;
  const totalItems = items.length;
  const doneItems = items.filter(i => i.done).length;
  const openItems = totalItems - doneItems;
  const completion = totalItems ? Math.round((doneItems / totalItems) * 100) : 0;

  const todayReminders = reminders.filter(r =>
    r.source === "list" &&
    r.reminder_date === today() &&
    !r.done
  ).length;

  const nextReminder = [...reminders]
    .filter(r => r.source === "list" && !r.done && r.reminder_date)
    .sort((a,b) => new Date(a.reminder_date || "2999-01-01") - new Date(b.reminder_date || "2999-01-01"))[0];

  kpisEl.innerHTML = `
    <div class="summary-card">
      <div class="kpi-title">Open list items</div>
      <div class="hero-number">${openItems}</div>
      <div class="progress"><span style="width:${completion}%"></span></div>
      <div class="mini-line">
        <span>${doneItems} done</span>
        <span>${completion}% complete</span>
      </div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Lists</div>
      <div class="kpi-value">${totalLists}</div>
      <div class="kpi-sub">Saved checklists</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Items</div>
      <div class="kpi-value">${totalItems}</div>
      <div class="kpi-sub">Across all lists</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Today</div>
      <div class="kpi-value">${todayReminders}</div>
      <div class="kpi-sub">List reminders due</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Next nudge</div>
      <div class="kpi-value">${nextReminder ? formatDate(nextReminder.reminder_date) : "None"}</div>
      <div class="kpi-sub">${nextReminder ? escapeHTML(nextReminder.title || "Reminder") : "No reminder set"}</div>
    </div>
  `;
}

async function load(){
  user = await getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  const [listsRes, itemsRes, remindersRes] = await Promise.all([
    supabase
      .from("lists")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending:false }),

    supabase
      .from("list_items")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending:true }),

    supabase
      .from("reminders")
      .select("*")
      .eq("user_id", user.id)
      .eq("source", "list")
  ]);

  if(listsRes.error){
    alert(listsRes.error.message);
    return;
  }

  if(itemsRes.error){
    alert(itemsRes.error.message);
    return;
  }

  if(remindersRes.error){
    alert(remindersRes.error.message);
    return;
  }

  lists = listsRes.data || [];
  items = itemsRes.data || [];
  reminders = remindersRes.data || [];

  render();
}

window.render = function(){
  renderKpis();

  const filtered = filteredLists();

  if(!filtered.length){
    notesGrid.innerHTML = `<div class="empty">No lists match this view yet.</div>`;
    return;
  }

  notesGrid.innerHTML = filtered.map(list => {
    const grouped = groupItems(list.id);
    const sections = Object.keys(grouped).slice(0,2);
    const listItems = itemsFor(list.id);
    const doneCount = listItems.filter(item => item.done).length;
    const totalCount = listItems.length;

    return `
      <article class="note-card" onclick="openList('${list.id}')">
        <div class="preview">
          <div class="preview-title">${escapeHTML(list.title || "Untitled")}</div>
          ${
            sections.length
              ? sections.map(section => `
                  <div class="preview-section">${escapeHTML(section)}</div>
                  ${
                    grouped[section].slice(0,2).map(item => `
                      <div class="preview-line">${item.done ? "☑" : "☐"} ${escapeHTML(item.text || "")}</div>
                    `).join("")
                  }
                `).join("")
              : `<div class="preview-line">No items yet</div>`
          }
        </div>

        <div class="note-title">${escapeHTML(list.title || "Untitled")}</div>
        <div class="note-date">${formatDate(list.created_at)}</div>

        <div class="note-meta">
          <span class="chip">${totalCount} items</span>
          <span class="chip done">${doneCount} done</span>
        </div>
      </article>
    `;
  }).join("");
};

function renderActiveItems(){
  if(!activeId){
    itemsWrap.innerHTML = `<div class="status">Save the main list title first, then import sections.</div>`;
    return;
  }

  const grouped = groupItems(activeId);
  const sections = Object.keys(grouped);

  if(!sections.length){
    itemsWrap.innerHTML = `<div class="status">No checklist items yet.</div>`;
    return;
  }

  itemsWrap.innerHTML = sections.map(section => `
    <div class="section-title">${escapeHTML(section)}</div>
    ${
      grouped[section].map(item => {
        const rem = reminderForItem(item.id);

        return `
          <div class="item-row" onclick="toggleItem('${item.id}', ${item.done ? "false" : "true"})">
            <div class="check ${item.done ? "done" : ""}">
              ${item.done ? "✓" : ""}
            </div>

            <div class="item-text ${item.done ? "done" : ""}">
              ${escapeHTML(item.text || "")}
              ${rem ? `<div class="item-date">⏰ ${formatReminder(rem)}</div>` : ""}
            </div>

            <button type="button" class="delete-small" onclick="event.stopPropagation(); deleteItem('${item.id}')">Delete</button>
          </div>
        `;
      }).join("")
    }
  `).join("");
}

window.openNew = function(){
  activeId = null;
  listTitle.value = "";
  quickPasteList.value = "";
  sectionReminderDate.value = "";
  sectionReminderTime.value = "";
  newSectionName.value = "";
  newItemText.value = "";
  itemReminderDate.value = "";
  itemReminderTime.value = "";
  setStatus("");
  renderActiveItems();
  modal.style.display = "flex";
  setTimeout(() => listTitle.focus(), 150);
};

window.openList = function(id){
  const list = lists.find(l => l.id === id);
  if(!list) return;

  activeId = id;
  listTitle.value = list.title || "";
  quickPasteList.value = "";
  sectionReminderDate.value = "";
  sectionReminderTime.value = "";
  newSectionName.value = "";
  newItemText.value = "";
  itemReminderDate.value = "";
  itemReminderTime.value = "";
  setStatus("");
  renderActiveItems();
  modal.style.display = "flex";
  setTimeout(() => quickPasteList.focus(), 150);
};

window.closeModal = function(){
  modal.style.display = "none";
  activeId = null;
};

window.saveListTitle = async function(){
  const title = listTitle.value.trim() || "Untitled";

  if(activeId){
    const { error } = await supabase
      .from("lists")
      .update({ title })
      .eq("id", activeId)
      .eq("user_id", user.id);

    if(error){
      setStatus(error.message);
      return;
    }

    setStatus("Main list title saved.");
  } else {
    const { data, error } = await supabase
      .from("lists")
      .insert([{ user_id:user.id, title }])
      .select()
      .single();

    if(error){
      setStatus(error.message);
      return;
    }

    activeId = data.id;
    setStatus("Main list created. Now import a section.");
  }

  await load();
  renderActiveItems();
};

window.importSection = async function(){
  const raw = quickPasteList.value.trim();

  if(!activeId){
    setStatus("Save the main list title first.");
    return;
  }

  if(!raw){
    setStatus("Paste a section first.");
    return;
  }

  const lines = raw
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean);

  if(lines.length < 2){
    setStatus("Use first line as subheading, then bullet points underneath.");
    return;
  }

  const section = cleanBullet(lines[0]).toLowerCase() || "general";

  const bulletItems = lines
    .slice(1)
    .map(cleanBullet)
    .filter(Boolean);

  if(!bulletItems.length){
    setStatus("Add bullet points under the subheading.");
    return;
  }

  const itemsToInsert = bulletItems.map(item => ({
    user_id:user.id,
    list_id:activeId,
    section,
    text:item,
    done:false
  }));

  const { data, error } = await supabase
    .from("list_items")
    .insert(itemsToInsert)
    .select();

  if(error){
    setStatus(error.message);
    return;
  }

  if(sectionReminderDate.value){
    const remindersToInsert = (data || []).map(item => ({
      user_id:user.id,
      source:"list",
      source_id:item.id,
      title:`${listTitle.value || "List"} · ${section}: ${item.text}`,
      reminder_date:sectionReminderDate.value,
      reminder_time:sectionReminderTime.value || null,
      done:false
    }));

    const remInsert = await supabase
      .from("reminders")
      .insert(remindersToInsert);

    if(remInsert.error){
      setStatus(remInsert.error.message);
      return;
    }
  }

  quickPasteList.value = "";
  sectionReminderDate.value = "";
  sectionReminderTime.value = "";

  setStatus(`Section "${section}" imported.`);
  await load();
  renderActiveItems();
  quickPasteList.focus();
};

window.addItem = async function(){
  const text = newItemText.value.trim();
  const section = (newSectionName.value.trim() || "general").toLowerCase();

  if(!activeId){
    setStatus("Save the main list title first.");
    return;
  }

  if(!text){
    setStatus("Type an item first.");
    return;
  }

  const { data, error } = await supabase
    .from("list_items")
    .insert([{
      user_id:user.id,
      list_id:activeId,
      section,
      text,
      done:false
    }])
    .select()
    .single();

  if(error){
    setStatus(error.message);
    return;
  }

  if(itemReminderDate.value){
    const remInsert = await supabase
      .from("reminders")
      .insert([{
        user_id:user.id,
        source:"list",
        source_id:data.id,
        title:`${listTitle.value || "List"} · ${section}: ${text}`,
        reminder_date:itemReminderDate.value,
        reminder_time:itemReminderTime.value || null,
        done:false
      }]);

    if(remInsert.error){
      setStatus(remInsert.error.message);
      return;
    }
  }

  newItemText.value = "";
  itemReminderDate.value = "";
  itemReminderTime.value = "";

  setStatus("Item added.");
  await load();
  renderActiveItems();
  newItemText.focus();
};

window.toggleItem = async function(id, done){
  const { error } = await supabase
    .from("list_items")
    .update({ done })
    .eq("id", id)
    .eq("user_id", user.id);

  if(error){
    setStatus(error.message);
    return;
  }

  await supabase
    .from("reminders")
    .update({ done })
    .eq("source", "list")
    .eq("source_id", id)
    .eq("user_id", user.id);

  await load();
  renderActiveItems();
};

window.deleteItem = async function(id){
  const itemDelete = await supabase
    .from("list_items")
    .delete()
    .eq("id", id)
    .eq("user_id", user.id);

  if(itemDelete.error){
    setStatus(itemDelete.error.message);
    return;
  }

  const reminderDelete = await supabase
    .from("reminders")
    .delete()
    .eq("source", "list")
    .eq("source_id", id)
    .eq("user_id", user.id);

  if(reminderDelete.error){
    setStatus(reminderDelete.error.message);
    return;
  }

  await load();
  renderActiveItems();
};

window.deleteList = async function(){
  if(!activeId){
    closeModal();
    return;
  }

  const ok = confirm("Delete this whole list?");
  if(!ok) return;

  const itemIds = itemsFor(activeId).map(item => item.id);

  if(itemIds.length){
    const remindersDelete = await supabase
      .from("reminders")
      .delete()
      .eq("source", "list")
      .in("source_id", itemIds)
      .eq("user_id", user.id);

    if(remindersDelete.error){
      setStatus(remindersDelete.error.message);
      return;
    }
  }

  const itemsDelete = await supabase
    .from("list_items")
    .delete()
    .eq("list_id", activeId)
    .eq("user_id", user.id);

  if(itemsDelete.error){
    setStatus(itemsDelete.error.message);
    return;
  }

  const listDelete = await supabase
    .from("lists")
    .delete()
    .eq("id", activeId)
    .eq("user_id", user.id);

  if(listDelete.error){
    setStatus(listDelete.error.message);
    return;
  }

  closeModal();
  await load();
};

newItemText.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    addItem();
  }
});

listTitle.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    saveListTitle();
  }
});

load();
</script>
