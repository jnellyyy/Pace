<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pace Bookings</title>

<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --panel3:rgba(255,255,255,0.12);
  --line:rgba(255,255,255,0.12);
  --line2:rgba(255,255,255,0.08);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --soft:#d9dee8;
  --accent:#ff3b30;
  --green:#22c55e;
  --amber:#f59e0b;
  --blue:#60a5fa;
  --red:#ef4444;
  --shadow:0 24px 70px rgba(0,0,0,0.42);
  --radius:28px;
}

*{
  box-sizing:border-box;
}

html{
  min-height:100%;
}

body{
  margin:0;
  min-height:100dvh;
  padding:18px;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(circle at 12% 0%, rgba(255,59,48,0.16), transparent 32%),
    radial-gradient(circle at 90% 8%, rgba(96,165,250,0.10), transparent 30%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
}

button,
input,
select,
textarea{
  font:inherit;
}

button{
  cursor:pointer;
}

.wrap{
  max-width:1220px;
  margin:0 auto;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:14px;
}

.brand-block{
  display:flex;
  align-items:center;
  gap:12px;
}

.app-dot{
  width:44px;
  height:44px;
  border-radius:16px;
  display:grid;
  place-items:center;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.32), transparent 28%),
    linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 14px 35px rgba(0,0,0,0.25);
  font-weight:900;
}

.eyebrow{
  margin:0;
  color:var(--muted);
  font-size:12px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  font-weight:800;
}

h1{
  margin:2px 0 0;
  font-size:28px;
  letter-spacing:-0.04em;
  line-height:1.05;
}

.back-btn{
  width:auto;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:11px 14px;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.10);
  color:#fff;
  text-decoration:none;
  font-weight:850;
  font-size:14px;
}

.back-btn:hover{
  background:rgba(255,255,255,0.12);
}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.045));
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  backdrop-filter:blur(22px);
}

.overview{
  padding:14px;
}

.kpis{
  display:grid;
  grid-template-columns:2fr repeat(4, 1fr);
  gap:12px;
}

.summary-card,
.kpi{
  background:rgba(255,255,255,0.07);
  border:1px solid var(--line2);
  border-radius:24px;
  padding:16px;
  min-height:112px;
  position:relative;
  overflow:hidden;
}

.summary-card:before{
  content:"";
  position:absolute;
  inset:auto -60px -80px auto;
  width:190px;
  height:190px;
  border-radius:999px;
  background:rgba(255,59,48,0.16);
  filter:blur(2px);
}

.kpi-title{
  font-size:12px;
  color:var(--muted);
  font-weight:750;
}

.kpi-value{
  font-size:24px;
  font-weight:900;
  margin-top:5px;
  letter-spacing:-0.03em;
}

.kpi-sub{
  color:var(--muted);
  font-size:12px;
  margin-top:6px;
  line-height:1.35;
}

.hero-money{
  font-size:32px;
  font-weight:950;
  letter-spacing:-0.05em;
  margin-top:4px;
}

.progress{
  height:8px;
  border-radius:999px;
  background:rgba(255,255,255,0.10);
  overflow:hidden;
  margin-top:14px;
}

.progress span{
  display:block;
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg, var(--accent), #ff7b72);
}

.money-mini{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:10px;
  color:var(--muted);
  font-size:12px;
  position:relative;
  z-index:1;
}

.workspace{
  display:grid;
  grid-template-columns:minmax(0, 1.35fr) minmax(330px, 0.65fr);
  gap:14px;
  margin-top:14px;
  align-items:start;
}

.panel{
  padding:16px;
}

.panel-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.panel-title{
  margin:0;
  font-size:18px;
  letter-spacing:-0.02em;
}

.muted{
  color:var(--muted);
}

.panel-copy{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}

.search-row{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-bottom:12px;
}

input,
select,
textarea{
  width:100%;
  min-height:46px;
  padding:12px 13px;
  border-radius:16px;
  background:rgba(255,255,255,0.065);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:rgba(255,59,48,0.55);
  box-shadow:0 0 0 4px rgba(255,59,48,0.10);
}

input::placeholder,
textarea::placeholder{
  color:#919aaa;
}

textarea{
  min-height:86px;
  resize:vertical;
}

.field{
  display:block;
}

.field span{
  display:block;
  font-size:12px;
  color:var(--muted);
  font-weight:750;
  margin:0 0 7px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.form-grid.three{
  grid-template-columns:1fr 1fr 1fr;
}

.full{
  grid-column:1 / -1;
}

.primary-btn{
  width:100%;
  min-height:48px;
  border:0;
  border-radius:18px;
  background:linear-gradient(135deg, var(--accent), #ff675d);
  color:#fff;
  font-weight:900;
  margin-top:12px;
  box-shadow:0 16px 35px rgba(255,59,48,0.20);
}

.primary-btn:hover{
  transform:translateY(-1px);
}

.notice{
  min-height:18px;
  margin:10px 0 0;
  color:var(--soft);
  font-size:13px;
}

.tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding-bottom:2px;
  margin:8px 0 13px;
}

.tab{
  width:auto;
  flex:0 0 auto;
  min-height:36px;
  padding:9px 12px;
  border:1px solid rgba(255,255,255,0.10);
  border-radius:999px;
  background:rgba(255,255,255,0.07);
  color:#fff;
  font-size:13px;
  font-weight:850;
}

.tab span{
  opacity:0.68;
  margin-left:5px;
}

.tab.active{
  background:var(--accent);
  border-color:rgba(255,255,255,0.08);
}

.bookings-list{
  max-height:calc(100dvh - 318px);
  overflow:auto;
  padding-right:3px;
}

.bookings-list::-webkit-scrollbar{
  width:8px;
}

.bookings-list::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.12);
  border-radius:999px;
}

.booking{
  background:rgba(255,255,255,0.075);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:24px;
  padding:15px;
  margin-top:11px;
}

.booking:first-child{
  margin-top:0;
}

.booking-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.name{
  font-weight:930;
  font-size:17px;
  letter-spacing:-0.02em;
}

.job-line{
  color:var(--muted);
  font-size:13px;
  margin-top:3px;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:10px;
}

.chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 9px;
  border-radius:999px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--soft);
  font-size:12px;
  font-weight:750;
}

.badge{
  flex:0 0 auto;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:7px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  color:#fff;
  white-space:nowrap;
}

.status-enquiry{
  background:#6b7280;
}

.status-pending-deposit{
  background:var(--amber);
}

.status-booked{
  background:var(--green);
}

.status-completed{
  background:#0f766e;
}

.status-cancelled{
  background:var(--red);
}

.status-lost-lead{
  background:#4b5563;
}

.status-postponed{
  background:var(--blue);
}

.money-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:9px;
  margin-top:12px;
}

.money-box{
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:11px;
}

.money-label{
  font-size:11px;
  color:var(--muted);
  font-weight:750;
}

.money-value{
  font-weight:920;
  margin-top:4px;
}

.note{
  margin-top:11px;
  color:var(--soft);
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}

.actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.small-btn{
  width:auto;
  min-height:38px;
  margin:0;
  padding:8px 11px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.09);
  color:#fff;
  font-size:13px;
  font-weight:850;
}

.save{
  background:rgba(34,197,94,0.22);
}

.danger{
  background:rgba(239,68,68,0.18);
}

.compact-select{
  width:auto;
  min-height:38px;
  margin:0;
  padding:8px 34px 8px 10px;
  border-radius:14px;
  font-size:13px;
}

.drawer{
  margin-top:11px;
  border-top:1px dashed rgba(255,255,255,0.13);
  padding-top:11px;
}

.drawer summary{
  cursor:pointer;
  color:#fff;
  font-weight:900;
  font-size:13px;
  list-style:none;
}

.drawer summary::-webkit-details-marker{
  display:none;
}

.drawer summary:after{
  content:"Open";
  float:right;
  color:var(--muted);
  font-weight:750;
}

.drawer[open] summary:after{
  content:"Close";
}

.drawer-body{
  margin-top:11px;
}

.payment-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:13px;
  color:var(--soft);
}

.payment-row:last-child{
  border-bottom:0;
}

.payment-main{
  line-height:1.35;
}

.payment-amount{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:900;
  white-space:nowrap;
}

.empty{
  color:var(--muted);
  padding:14px 0;
  font-size:13px;
}

@media(max-width:980px){
  .kpis{
    grid-template-columns:1fr 1fr;
  }

  .summary-card{
    grid-column:1 / -1;
  }

  .workspace{
    grid-template-columns:1fr;
  }

  .bookings-list{
    max-height:none;
    overflow:visible;
  }
}

@media(max-width:680px){
  body{
    padding:12px;
  }

  .topbar{
    align-items:flex-start;
  }

  h1{
    font-size:24px;
  }

  .kpis,
  .form-grid,
  .form-grid.three,
  .money-grid{
    grid-template-columns:1fr;
  }

  .booking-head{
    flex-direction:column;
  }

  .badge{
    align-self:flex-start;
  }

  .payment-row{
    flex-direction:column;
  }

  .compact-select{
    width:100%;
  }

  .small-btn{
    width:100%;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <header class="topbar">
    <div class="brand-block">
      <div class="app-dot">P</div>
      <div>
        <p class="eyebrow">Pace</p>
        <h1>Bookings</h1>
      </div>
    </div>

    <a href="dashboard.html" class="back-btn">‹ Dashboard</a>
  </header>

  <section class="card overview">
    <div class="kpis" id="kpis"></div>
  </section>

  <main class="workspace">

    <section class="card panel">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">Booking list</h2>
          <p class="panel-copy">Track enquiries, paid balances, postponed jobs and completed bookings.</p>
        </div>
      </div>

      <div class="search-row">
        <input id="searchBox" placeholder="Search client, job, notes or status">
      </div>

      <div class="tabs" id="tabs"></div>

      <div id="bookings" class="bookings-list">
        <div class="empty">Loading bookings...</div>
      </div>
    </section>

    <aside class="card panel">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">Add booking</h2>
          <p class="panel-copy">Capture the job now. Add payments once money comes in.</p>
        </div>
      </div>

      <div class="form-grid">
        <label class="field">
          <span>Client</span>
          <input id="clientName" placeholder="Client or couple name">
        </label>

        <label class="field">
          <span>Job</span>
          <input id="jobName" placeholder="Wedding, shoot, event">
        </label>
      </div>

      <div class="form-grid three">
        <label class="field">
          <span>Event date</span>
          <input id="eventDate" type="date">
        </label>

        <label class="field">
          <span>Total price</span>
          <input id="price" type="number" step="0.01" placeholder="0.00">
        </label>

        <label class="field">
          <span>Balance due</span>
          <input id="dueDate" type="date">
        </label>
      </div>

      <div class="form-grid">
        <label class="field">
          <span>Status</span>
          <select id="status">
            <option>Enquiry</option>
            <option>Pending deposit</option>
            <option>Booked</option>
            <option>Postponed</option>
            <option>Completed</option>
            <option>Cancelled</option>
            <option>Lost lead</option>
          </select>
        </label>

        <label class="field">
          <span>New date</span>
          <input id="newEventDate" type="date">
        </label>
      </div>

      <label class="field">
        <span>Notes</span>
        <textarea id="note" placeholder="Package, venue, next step, client preference"></textarea>
      </label>

      <button id="saveBookingBtn" class="primary-btn">Save booking</button>
      <p id="msg" class="notice"></p>
    </aside>

  </main>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      storage:localStorage
    }
  }
);

const statuses = [
  "All",
  "Enquiry",
  "Pending deposit",
  "Booked",
  "Postponed",
  "Completed",
  "Cancelled",
  "Lost lead"
];

let user = null;
let bookings = [];
let payments = [];
let activeTab = "All";
let searchTerm = "";

const tabsEl = document.getElementById("tabs");
const bookingsEl = document.getElementById("bookings");
const kpisEl = document.getElementById("kpis");
const msgEl = document.getElementById("msg");
const searchBoxEl = document.getElementById("searchBox");

const clientNameEl = document.getElementById("clientName");
const jobNameEl = document.getElementById("jobName");
const eventDateEl = document.getElementById("eventDate");
const priceEl = document.getElementById("price");
const dueDateEl = document.getElementById("dueDate");
const statusEl = document.getElementById("status");
const newEventDateEl = document.getElementById("newEventDate");
const noteEl = document.getElementById("note");

function setMsg(text){
  msgEl.textContent = text;
}

function money(v){
  return `£${Number(v || 0).toFixed(2)}`;
}

function formatDate(v){
  if(!v) return "No date set";
  return new Date(v + "T00:00:00").toLocaleDateString("en-GB");
}

function escapeHTML(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function paymentsFor(id){
  return payments.filter(p => p.booking_id === id);
}

function paidTotal(id){
  return paymentsFor(id).reduce((sum,p) => sum + Number(p.amount || 0), 0);
}

function statusClass(status){
  return "status-" + String(status || "")
    .toLowerCase()
    .replace(/\s+/g, "-");
}

function statusCount(status){
  if(status === "All") return bookings.length;
  return bookings.filter(b => b.status === status).length;
}

function bookingVisibleDate(booking){
  if(booking.status === "Postponed"){
    return booking.new_event_date || booking.event_date;
  }

  return booking.event_date;
}

function displayDate(booking){
  if(booking.status === "Postponed"){
    return booking.new_event_date
      ? `New date ${formatDate(booking.new_event_date)}`
      : "New date needed";
  }

  return `Event ${formatDate(booking.event_date)}`;
}

function getNextBooking(){
  const today = new Date();
  today.setHours(0,0,0,0);

  return [...bookings]
    .filter(b => !["Completed", "Cancelled", "Lost lead"].includes(b.status))
    .map(b => ({
      ...b,
      visible_date: bookingVisibleDate(b)
    }))
    .filter(b => b.visible_date)
    .filter(b => new Date(b.visible_date + "T00:00:00") >= today)
    .sort((a,b) => new Date(a.visible_date) - new Date(b.visible_date))[0];
}

function renderTabs(){
  tabsEl.innerHTML = statuses.map(s => `
    <button class="tab ${activeTab === s ? "active" : ""}" onclick="setTab('${s}')">
      ${s}<span>${statusCount(s)}</span>
    </button>
  `).join("");
}

window.setTab = function(tab){
  activeTab = tab;
  render();
};

function renderKpis(){
  const totalValue = bookings.reduce((sum,b) => sum + Number(b.price || 0), 0);
  const totalPaid = payments.reduce((sum,p) => sum + Number(p.amount || 0), 0);
  const outstanding = Math.max(totalValue - totalPaid, 0);
  const paidPercent = totalValue ? Math.min(100, Math.round((totalPaid / totalValue) * 100)) : 0;
  const openJobs = bookings.filter(b => ["Enquiry", "Pending deposit"].includes(b.status)).length;
  const bookedJobs = bookings.filter(b => b.status === "Booked").length;
  const postponedJobs = bookings.filter(b => b.status === "Postponed").length;
  const nextBooking = getNextBooking();

  kpisEl.innerHTML = `
    <div class="summary-card">
      <div class="kpi-title">Total pipeline</div>
      <div class="hero-money">${money(totalValue)}</div>
      <div class="progress"><span style="width:${paidPercent}%"></span></div>
      <div class="money-mini">
        <span>Paid ${money(totalPaid)}</span>
        <span>Outstanding ${money(outstanding)}</span>
      </div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Total jobs</div>
      <div class="kpi-value">${bookings.length}</div>
      <div class="kpi-sub">All saved bookings</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Open leads</div>
      <div class="kpi-value">${openJobs}</div>
      <div class="kpi-sub">Enquiry and deposit stage</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Booked</div>
      <div class="kpi-value">${bookedJobs}</div>
      <div class="kpi-sub">Confirmed jobs</div>
    </div>

    <div class="kpi">
      <div class="kpi-title">Next job</div>
      <div class="kpi-value">${nextBooking ? formatDate(nextBooking.visible_date) : "None"}</div>
      <div class="kpi-sub">${nextBooking ? escapeHTML(nextBooking.client_name || "Upcoming booking") : `${postponedJobs} postponed`}</div>
    </div>
  `;
}

function render(){
  renderTabs();
  renderKpis();

  let rows = [...bookings];

  if(activeTab !== "All"){
    rows = rows.filter(b => b.status === activeTab);
  }

  if(searchTerm){
    rows = rows.filter(b => {
      const haystack = [
        b.client_name,
        b.job_name,
        b.status,
        b.note,
        b.event_date,
        b.new_event_date,
        b.due_date
      ].join(" ").toLowerCase();

      return haystack.includes(searchTerm);
    });
  }

  rows.sort((a,b) => {
    if(a.status === "Postponed" && b.status !== "Postponed") return 1;
    if(a.status !== "Postponed" && b.status === "Postponed") return -1;

    const dateA = bookingVisibleDate(a);
    const dateB = bookingVisibleDate(b);

    return new Date(dateA || "2999-01-01") - new Date(dateB || "2999-01-01");
  });

  if(!rows.length){
    bookingsEl.innerHTML = `<div class="empty">No bookings match this view yet.</div>`;
    return;
  }

  bookingsEl.innerHTML = rows.map(b => {
    const paid = paidTotal(b.id);
    const total = Number(b.price || 0);
    const remaining = Math.max(total - paid, 0);
    const bPayments = paymentsFor(b.id);

    const client = escapeHTML(b.client_name || "");
    const job = escapeHTML(b.job_name || "Booking");
    const note = escapeHTML(b.note || "");

    return `
      <article class="booking">
        <div class="booking-head">
          <div>
            <div class="name">${client}</div>
            <div class="job-line">${job}</div>

            <div class="chips">
              <span class="chip">${displayDate(b)}</span>
              ${b.status === "Postponed" ? `<span class="chip">Original ${formatDate(b.event_date)}</span>` : ""}
              <span class="chip">Due ${formatDate(b.due_date)}</span>
            </div>
          </div>

          <span class="badge ${statusClass(b.status)}">
            ${b.status === "Postponed" && !b.new_event_date ? "Pending new date" : escapeHTML(b.status)}
          </span>
        </div>

        <div class="money-grid">
          <div class="money-box">
            <div class="money-label">Total</div>
            <div class="money-value">${money(total)}</div>
          </div>

          <div class="money-box">
            <div class="money-label">Paid</div>
            <div class="money-value">${money(paid)}</div>
          </div>

          <div class="money-box">
            <div class="money-label">Remaining</div>
            <div class="money-value">${money(remaining)}</div>
          </div>
        </div>

        ${note ? `<div class="note">${note}</div>` : ""}

        <div class="actions">
          <select class="compact-select" id="move-${b.id}">
            ${statuses.filter(s => s !== "All").map(s => `
              <option ${b.status === s ? "selected" : ""}>${s}</option>
            `).join("")}
          </select>

          <button class="small-btn save" onclick="moveBooking('${b.id}')">Move</button>
          <button class="small-btn danger" onclick="deleteBooking('${b.id}')">Delete</button>
        </div>

        <details class="drawer">
          <summary>Edit booking</summary>

          <div class="drawer-body">
            <div class="form-grid">
              <label class="field">
                <span>Client</span>
                <input id="edit-client-${b.id}" value="${escapeHTML(b.client_name || "")}" placeholder="Client">
              </label>

              <label class="field">
                <span>Job</span>
                <input id="edit-job-${b.id}" value="${escapeHTML(b.job_name || "")}" placeholder="Job">
              </label>
            </div>

            <div class="form-grid three">
              <label class="field">
                <span>Event date</span>
                <input id="edit-event-${b.id}" type="date" value="${b.event_date || ""}">
              </label>

              <label class="field">
                <span>New date</span>
                <input id="edit-new-event-${b.id}" type="date" value="${b.new_event_date || ""}">
              </label>

              <label class="field">
                <span>Total price</span>
                <input id="edit-price-${b.id}" type="number" step="0.01" value="${Number(b.price || 0)}">
              </label>
            </div>

            <div class="form-grid">
              <label class="field">
                <span>Balance due</span>
                <input id="edit-due-${b.id}" type="date" value="${b.due_date || ""}">
              </label>

              <label class="field">
                <span>Status</span>
                <select id="edit-status-${b.id}">
                  ${statuses.filter(s => s !== "All").map(s => `
                    <option ${b.status === s ? "selected" : ""}>${s}</option>
                  `).join("")}
                </select>
              </label>
            </div>

            <label class="field">
              <span>Notes</span>
              <textarea id="edit-note-${b.id}">${escapeHTML(b.note || "")}</textarea>
            </label>

            <button class="small-btn save" onclick="saveEdit('${b.id}')">Save changes</button>
          </div>
        </details>

        <details class="drawer">
          <summary>Payments</summary>

          <div class="drawer-body">
            ${
              bPayments.length
                ? bPayments.map(p => `
                  <div class="payment-row">
                    <div class="payment-main">
                      <strong>${escapeHTML(p.payment_type || "Payment")}</strong><br>
                      ${formatDate(p.payment_date)}
                      ${p.note ? `<br>${escapeHTML(p.note)}` : ""}
                    </div>

                    <div class="payment-amount">
                      ${money(p.amount)}
                      <button class="small-btn danger" onclick="deletePayment('${p.id}')">Delete</button>
                    </div>
                  </div>
                `).join("")
                : `<div class="empty">No payments yet.</div>`
            }

            <div class="form-grid three">
              <label class="field">
                <span>Amount</span>
                <input id="pay-amount-${b.id}" type="number" step="0.01" placeholder="0.00">
              </label>

              <label class="field">
                <span>Type</span>
                <select id="pay-type-${b.id}">
                  <option>Deposit</option>
                  <option>Instalment</option>
                  <option>Final balance</option>
                  <option>Additional payment</option>
                </select>
              </label>

              <label class="field">
                <span>Date</span>
                <input id="pay-date-${b.id}" type="date">
              </label>
            </div>

            <label class="field">
              <span>Payment note</span>
              <input id="pay-note-${b.id}" placeholder="Optional note">
            </label>

            <button class="small-btn" onclick="addPayment('${b.id}')">Add payment</button>
          </div>
        </details>
      </article>
    `;
  }).join("");
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

async function load(){
  user = await getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  const [bookingsRes, paymentsRes] = await Promise.all([
    supabase
      .from("bookings")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending:false }),

    supabase
      .from("payments")
      .select("*")
      .eq("user_id", user.id)
      .order("payment_date", { ascending:false })
  ]);

  if(bookingsRes.error){
    setMsg(bookingsRes.error.message);
    return;
  }

  if(paymentsRes.error){
    setMsg(paymentsRes.error.message);
    return;
  }

  bookings = bookingsRes.data || [];
  payments = paymentsRes.data || [];

  render();
}

searchBoxEl.addEventListener("input", () => {
  searchTerm = searchBoxEl.value.trim().toLowerCase();
  render();
});

document.getElementById("saveBookingBtn").onclick = async () => {
  const clientName = clientNameEl.value.trim();
  const jobName = jobNameEl.value.trim();

  if(!clientName){
    setMsg("Enter client name.");
    return;
  }

  const { error } = await supabase.from("bookings").insert([{
    user_id:user.id,
    client_name:clientName,
    job_name:jobName || "Booking",
    event_date:eventDateEl.value || null,
    new_event_date:newEventDateEl.value || null,
    price:Number(priceEl.value || 0),
    due_date:dueDateEl.value || null,
    status:statusEl.value,
    note:noteEl.value.trim() || null
  }]);

  if(error){
    setMsg(error.message);
    return;
  }

  clientNameEl.value = "";
  jobNameEl.value = "";
  eventDateEl.value = "";
  newEventDateEl.value = "";
  priceEl.value = "";
  dueDateEl.value = "";
  statusEl.value = "Enquiry";
  noteEl.value = "";

  setMsg("Booking saved.");
  await load();
};

window.saveEdit = async function(id){
  const status = document.getElementById(`edit-status-${id}`).value;

  const { error } = await supabase
    .from("bookings")
    .update({
      client_name:document.getElementById(`edit-client-${id}`).value.trim(),
      job_name:document.getElementById(`edit-job-${id}`).value.trim() || "Booking",
      event_date:document.getElementById(`edit-event-${id}`).value || null,
      new_event_date:document.getElementById(`edit-new-event-${id}`).value || null,
      price:Number(document.getElementById(`edit-price-${id}`).value || 0),
      due_date:document.getElementById(`edit-due-${id}`).value || null,
      status,
      note:document.getElementById(`edit-note-${id}`).value.trim() || null
    })
    .eq("id", id)
    .eq("user_id", user.id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Booking updated.");
  await load();
};

window.moveBooking = async function(id){
  const status = document.getElementById(`move-${id}`).value;

  const { error } = await supabase
    .from("bookings")
    .update({ status })
    .eq("id", id)
    .eq("user_id", user.id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Booking moved.");
  await load();
};

window.deleteBooking = async function(id){
  const ok = confirm("Delete this booking and its payments?");
  if(!ok) return;

  const paymentsDelete = await supabase
    .from("payments")
    .delete()
    .eq("booking_id", id)
    .eq("user_id", user.id);

  if(paymentsDelete.error){
    setMsg(paymentsDelete.error.message);
    return;
  }

  const bookingDelete = await supabase
    .from("bookings")
    .delete()
    .eq("id", id)
    .eq("user_id", user.id);

  if(bookingDelete.error){
    setMsg(bookingDelete.error.message);
    return;
  }

  setMsg("Booking deleted.");
  await load();
};

window.addPayment = async function(id){
  const amount = Number(document.getElementById(`pay-amount-${id}`).value || 0);

  if(!amount){
    setMsg("Enter payment amount.");
    return;
  }

  const { error } = await supabase.from("payments").insert([{
    user_id:user.id,
    booking_id:id,
    amount,
    payment_type:document.getElementById(`pay-type-${id}`).value,
    payment_date:document.getElementById(`pay-date-${id}`).value || null,
    note:document.getElementById(`pay-note-${id}`).value.trim() || null
  }]);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Payment added.");
  await load();
};

window.deletePayment = async function(id){
  const { error } = await supabase
    .from("payments")
    .delete()
    .eq("id", id)
    .eq("user_id", user.id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Payment deleted.");
  await load();
};

load();
</script>
</body>
</html>
