<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings</title>

<style>
:root {
  --bg:#111;
  --card:#1b1b1b;
  --line:#333;
  --text:#fff;
  --muted:#aaa;

  --enquiry:#666;
  --will:#2563eb;
  --pending:#ca8a04;
  --booked:#16a34a;
  --completed:#065f46;
  --cancelled:#dc2626;
  --lost:#555;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  padding: 20px;
  margin: 0;
}

.wrap {
  max-width: 1000px;
  margin: 0 auto;
}

.kpi {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.kpi-box {
  background: #1b1b1b;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 10px 14px;
  min-width: 120px;
}

.kpi-title {
  font-size: 12px;
  color: #aaa;
}

.kpi-value {
  font-size: 18px;
  font-weight: 700;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px;
  margin-top: 16px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  background: #0f0f0f;
  color: #fff;
  border: 1px solid #333;
  box-sizing: border-box;
  font: inherit;
}

textarea {
  min-height: 80px;
  resize: vertical;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  background: #d41425;
  color: #fff;
  border: none;
  font-weight: 700;
  cursor: pointer;
  font: inherit;
}

.notice {
  color: #bbb;
  margin-top: 10px;
  white-space: pre-wrap;
}

.section {
  margin-top: 24px;
}

.section-title {
  font-weight: 700;
  margin-bottom: 10px;
}

.booking {
  background: #222;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 12px;
  margin-top: 10px;
}

.top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.name {
  font-weight: 700;
  margin-bottom: 4px;
}

.meta {
  font-size: 13px;
  color: #bbb;
  line-height: 1.45;
}

.badge {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 999px;
}

.delete {
  background: none;
  border: none;
  color: #888;
  font-size: 18px;
  cursor: pointer;
  padding: 0;
  margin: 0;
  width: auto;
}

.empty {
  color: #666;
  font-size: 14px;
}

.enquiry { background: var(--enquiry); }
.will { background: var(--will); }
.pending { background: var(--pending); }
.booked { background: var(--booked); }
.completed { background: var(--completed); }
.cancelled { background: var(--cancelled); }
.lost { background: var(--lost); }

@media (max-width: 640px) {
  .row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="kpi" id="kpi"></div>

  <div class="card">
    <input id="clientName" placeholder="Client name">

    <div class="row">
      <input id="eventDate" type="date">
      <input id="price" type="number" placeholder="Price">
    </div>

    <select id="bookingStatus">
      <option>Enquiry</option>
      <option>Said they will book</option>
      <option>Pending deposit</option>
      <option>Booked</option>
      <option>Completed</option>
      <option>Cancelled</option>
      <option>Lost lead</option>
    </select>

    <textarea id="bookingNote" placeholder="Notes"></textarea>

    <button id="saveBtn" type="button">Save booking</button>
    <p id="msg" class="notice"></p>
  </div>

  <div id="sections"></div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const clientNameEl = document.getElementById("clientName");
const eventDateEl = document.getElementById("eventDate");
const priceEl = document.getElementById("price");
const bookingStatusEl = document.getElementById("bookingStatus");
const bookingNoteEl = document.getElementById("bookingNote");
const saveBtn = document.getElementById("saveBtn");
const sectionsEl = document.getElementById("sections");
const kpiEl = document.getElementById("kpi");
const msgEl = document.getElementById("msg");

const order = [
  "Enquiry",
  "Said they will book",
  "Pending deposit",
  "Booked",
  "Completed",
  "Cancelled",
  "Lost lead"
];

function setMsg(text) {
  msgEl.textContent = text;
}

function badgeClass(status) {
  return {
    "Enquiry":"enquiry",
    "Said they will book":"will",
    "Pending deposit":"pending",
    "Booked":"booked",
    "Completed":"completed",
    "Cancelled":"cancelled",
    "Lost lead":"lost"
  }[status] || "";
}

async function getUser() {
  const { data, error } = await supabase.auth.getUser();
  if (error) return null;
  return data.user;
}

function formatDate(value) {
  if (!value) return "No date set";
  return new Date(value + "T00:00:00").toLocaleDateString("en-GB");
}

function formatMoney(value) {
  return `£${Number(value || 0).toFixed(0)}`;
}

saveBtn.addEventListener("click", addBooking);

async function addBooking() {
  const user = await getUser();

  if (!user) {
    setMsg("Not logged in.");
    return;
  }

  const clientName = clientNameEl.value.trim();
  const eventDate = eventDateEl.value || null;
  const price = Number(priceEl.value || 0);
  const status = bookingStatusEl.value;
  const note = bookingNoteEl.value.trim();

  if (!clientName) {
    setMsg("Enter a client name.");
    return;
  }

  const { error } = await supabase.from("bookings").insert([{
    user_id: user.id,
    client_name: clientName,
    event_date: eventDate,
    price,
    status,
    note
  }]);

  if (error) {
    setMsg(error.message);
    return;
  }

  clientNameEl.value = "";
  eventDateEl.value = "";
  priceEl.value = "";
  bookingStatusEl.value = "Enquiry";
  bookingNoteEl.value = "";
  setMsg("Booking saved.");

  await load();
}

window.delBooking = async function(id) {
  const { error } = await supabase.from("bookings").delete().eq("id", id);

  if (error) {
    setMsg(error.message);
    return;
  }

  setMsg("Booking deleted.");
  await load();
};

async function load() {
  const user = await getUser();

  if (!user) {
    sectionsEl.innerHTML = `<div class="empty">Not logged in.</div>`;
    kpiEl.innerHTML = "";
    return;
  }

  const { data, error } = await supabase
    .from("bookings")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  if (error) {
    setMsg(error.message);
    return;
  }

  const bookings = data || [];

  const booked = bookings.filter(b => b.status === "Booked").length;
  const completed = bookings.filter(b => b.status === "Completed").length;
  const pipeline = bookings
    .filter(b => b.status !== "Lost lead" && b.status !== "Cancelled")
    .reduce((sum, b) => sum + Number(b.price || 0), 0);

  kpiEl.innerHTML = `
    <div class="kpi-box">
      <div class="kpi-title">Enquiries</div>
      <div class="kpi-value">${bookings.length}</div>
    </div>
    <div class="kpi-box">
      <div class="kpi-title">Booked</div>
      <div class="kpi-value">${booked}</div>
    </div>
    <div class="kpi-box">
      <div class="kpi-title">Completed</div>
      <div class="kpi-value">${completed}</div>
    </div>
    <div class="kpi-box">
      <div class="kpi-title">Pipeline £</div>
      <div class="kpi-value">£${pipeline}</div>
    </div>
  `;

  sectionsEl.innerHTML = order.map(section => {
    const items = bookings.filter(b => (b.status || "Enquiry") === section);

    return `
      <div class="section">
        <div class="section-title">${section}</div>
        ${
          items.length === 0
            ? `<div class="empty">No bookings</div>`
            : items.map(b => `
              <div class="booking">
                <div class="top">
                  <div>
                    <div class="name">${b.client_name || ""}</div>
                    <div class="meta">
                      ${formatDate(b.event_date)} • ${formatMoney(b.price)}
                    </div>
                  </div>

                  <button class="delete" onclick="delBooking('${b.id}')" aria-label="Delete">×</button>
                </div>

                <div style="margin-top:8px;">
                  <span class="badge ${badgeClass(b.status)}">${b.status}</span>
                </div>

                ${b.note ? `<div class="meta" style="margin-top:6px;">${b.note}</div>` : ""}
              </div>
            `).join("")
        }
      </div>
    `;
  }).join("");
}

load();
</script>

</body>
</html>
